name: Debug Pages integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pages-integration-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install Pages dependencies
        working-directory: site
        run: npm ci
      - name: Run Pages integration with captured output
        id: integration
        shell: bash
        run: |
          set +e
          npm --prefix site run test:integration > pages-integration.log 2>&1
          status=$?
          cat pages-integration.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload integration log
        uses: actions/upload-artifact@v4
        with:
          name: pages-integration-log
          path: pages-integration.log
          if-no-files-found: error
      - name: Preserve test result
        if: steps.integration.outputs.status != '0'
        run: exit 1
