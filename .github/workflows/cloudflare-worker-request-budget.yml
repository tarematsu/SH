name: Check Worker daily request budget

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/wrangler*.jsonc"
      - "worker/scripts/select-worker-deploys.mjs"
      - "scripts/cloudflare-worker-request-budget.mjs"
      - "tests/cloudflare-worker-request-budget.test.mjs"
      - ".github/workflows/cloudflare-worker-request-budget.yml"
  schedule:
    - cron: "41 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      PAGES_FUNCTION_REQUEST_RESERVE_PER_DAY: "25000"
      WORKER_REQUEST_BUDGET_OUTPUT_DIR: worker-request-budget
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Calculate the 50 percent daily request budget
        run: node scripts/cloudflare-worker-request-budget.mjs
      - name: Publish request budget summary
        if: always()
        run: cat worker-request-budget/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload request budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-worker-request-budget-${{ github.run_id }}
          path: worker-request-budget/
          if-no-files-found: error
          retention-days: 14
