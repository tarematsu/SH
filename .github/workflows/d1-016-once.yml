name: D1 migration 016 once

on:
  push:
    branches:
      - maintenance/d1-016-run
    paths:
      - .github/workflows/d1-016-once.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: d1-migration-016-once
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CF_PAGES_BRANCH: main
      D1_MIGRATION_NAME: 016_email_stream_runtime.sql
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CF_ACCOUNT_PREFIX: 0500f25c2f74e7e7
      CF_ACCOUNT_SUFFIX: 6c94a8bcb6c7008b

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Pages tooling
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Prepare Cloudflare credentials
        shell: bash
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${CF_ACCOUNT_PREFIX}${CF_ACCOUNT_SUFFIX}" >> "$GITHUB_ENV"
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'Cloudflare API token secret is missing'; exit 1; }

      - name: Preflight required tables and migration state
        working-directory: site
        shell: bash
        run: |
          npx wrangler d1 execute stationhead-monitor --remote --config wrangler.jsonc --json \
            --command "SELECT 'table' AS kind,name FROM sqlite_master WHERE type='table' AND name IN ('sh_email_stream_snapshots','sh_weekly_summary') UNION ALL SELECT 'migration' AS kind,name FROM d1_migrations WHERE name='016_email_stream_runtime.sql';" \
            > d1-016-preflight.json
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('d1-016-preflight.json', 'utf8'));
          const groups = Array.isArray(payload) ? payload : [payload];
          const rows = groups.flatMap((group) => group?.results || group?.result?.[0]?.results || []);
          const tables = new Set(rows.filter((row) => row.kind === 'table').map((row) => row.name));
          const required = ['sh_email_stream_snapshots', 'sh_weekly_summary'];
          const missing = required.filter((name) => !tables.has(name));
          if (missing.length) throw new Error(`Required remote tables are missing: ${missing.join(', ')}`);
          if (rows.some((row) => row.kind === 'migration')) throw new Error('Migration 016 is already recorded as applied; refusing to reapply.');
          console.log('Preflight passed: required tables exist and migration 016 is pending.');
          NODE

      - name: Apply only migration 016
        working-directory: site
        run: npm run db:migrate

      - name: Verify migration record and created objects
        working-directory: site
        shell: bash
        run: |
          npx wrangler d1 execute stationhead-monitor --remote --config wrangler.jsonc --json \
            --command "SELECT 'migration' AS kind,name FROM d1_migrations WHERE name='016_email_stream_runtime.sql' UNION ALL SELECT type AS kind,name FROM sqlite_master WHERE name IN ('idx_sh_email_stream_snapshots_week','trg_sh_email_stream_weekly_insert','trg_sh_email_stream_weekly_update') UNION ALL SELECT 'unexpected' AS kind,name FROM d1_migrations WHERE name IN ('017_resend_health_alert.sql','018_health_alert_delivery.sql','019_collector_failure_diagnostics.sql');" \
            > d1-016-verify.json
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('d1-016-verify.json', 'utf8'));
          const groups = Array.isArray(payload) ? payload : [payload];
          const rows = groups.flatMap((group) => group?.results || group?.result?.[0]?.results || []);
          const expected = new Map([
            ['016_email_stream_runtime.sql', 'migration'],
            ['idx_sh_email_stream_snapshots_week', 'index'],
            ['trg_sh_email_stream_weekly_insert', 'trigger'],
            ['trg_sh_email_stream_weekly_update', 'trigger'],
          ]);
          for (const [name, kind] of expected) {
            if (!rows.some((row) => row.name === name && row.kind === kind)) {
              throw new Error(`Verification failed for ${kind}: ${name}`);
            }
          }
          const unexpected = rows.filter((row) => row.kind === 'unexpected');
          if (unexpected.length) throw new Error(`Later migrations were unexpectedly applied: ${unexpected.map((row) => row.name).join(', ')}`);
          console.log('Verified migration 016, its index, both triggers, and that 017-019 remain unapplied.');
          NODE

      - name: Report result to pull request
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          gh pr comment 84 --body "D1 migration 016 run finished with status: **${JOB_STATUS}**

          Target: \`016_email_stream_runtime.sql\`

          Run: ${RUN_URL}"
