name: Deploy emergency collector recovery

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Worker dependencies
        run: npm --prefix worker install --no-audit --no-fund

      - name: Deploy Worker
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          (
            cd worker
            npx wrangler deploy --config wrangler.jsonc
          ) 2>&1 | tee /tmp/deploy.log
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Allow deployment and Cron to settle
        if: steps.deploy.outputs.code == '0'
        run: sleep 75

      - name: Probe production runtime
        if: always()
        id: probe
        shell: bash
        run: |
          set -uo pipefail
          probe() {
            local name="$1" url="$2" body="/tmp/${name}.body" code
            code=$(curl --silent --show-error --location --max-time 25 --output "$body" --write-out '%{http_code}' "$url" 2>"/tmp/${name}.stderr" || true)
            printf '## %s\n\n- HTTP: `%s`\n\n```json\n' "$name" "${code:-curl-failed}"
            if jq -e . "$body" >/dev/null 2>&1; then
              jq . "$body" | head -c 14000
            else
              head -c 14000 "$body" 2>/dev/null || true
              cat "/tmp/${name}.stderr" 2>/dev/null || true
            fi
            printf '\n```\n\n'
          }

          {
            echo '<!-- emergency-worker-deploy -->'
            echo '# Emergency Worker deployment and recovery check'
            echo
            echo "- Main commit: \`${GITHUB_SHA}\`"
            echo "- Deploy exit code: \`${{ steps.deploy.outputs.code }}\`"
            echo "- Checked at: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`"
            echo
            echo '## Deploy log'
            echo
            echo '```text'
            tail -n 160 /tmp/deploy.log 2>/dev/null || echo 'deploy log unavailable'
            echo '```'
            echo
            probe pages-health 'https://skrzk.pages.dev/api/health'
            probe worker-health 'https://stationhead-monitor-collector.tarematsu.workers.dev/health'
            probe worker-lease 'https://stationhead-monitor-collector.tarematsu.workers.dev/coordination/lease'
          } > /tmp/report.md

      - name: Post deployment report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/69/comments" --jq '.[] | select(.body | contains("<!-- emergency-worker-deploy -->")) | .id' | tail -n 1)
          if [[ -n "$existing" ]]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing" --field body=@/tmp/report.md
          else
            gh pr comment 69 --repo "$GITHUB_REPOSITORY" --body-file /tmp/report.md
          fi

      - name: Fail if deployment failed
        if: steps.deploy.outputs.code != '0'
        run: exit 1
