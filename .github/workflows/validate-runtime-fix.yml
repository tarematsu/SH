name: Validate runtime collector repair

on:
  push:
    branches:
      - fix/runtime-collector-stall-20260704

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm --prefix worker install --no-audit --no-fund
          npm --prefix site install --no-audit --no-fund

      - name: Run repository checks
        id: checks
        shell: bash
        run: |
          set +e
          npm run check > /tmp/check.log 2>&1
          code=$?
          cat /tmp/check.log
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post validation result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHECK_CODE: ${{ steps.checks.outputs.code }}
        run: |
          {
            echo '<!-- runtime-fix-validation -->'
            echo '## 修正検証結果'
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- \`npm run check\` exit code: \`${CHECK_CODE:-not-run}\`"
            echo
            echo '```text'
            tail -n 220 /tmp/check.log 2>/dev/null || echo 'check log unavailable'
            echo '```'
          } > /tmp/comment.md
          existing=$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/69/comments" --jq '.[] | select(.body | contains("<!-- runtime-fix-validation -->")) | .id' | tail -n 1)
          if [[ -n "$existing" ]]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing" --field body=@/tmp/comment.md
          else
            gh pr comment 69 --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
          fi

      - name: Fail when checks fail
        if: steps.checks.outputs.code != '0'
        run: exit 1
