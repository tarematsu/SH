name: Apply minute fact forward-fill repair

on:
  push:
    branches:
      - agent/fix-minute-fact-stream-forward-fill
    paths:
      - scripts/patch-minute-fact-forward-fill.mjs
      - .github/workflows/patch-minute-fact-forward-fill.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-minute-fact-stream-forward-fill
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply repair
        run: node scripts/patch-minute-fact-forward-fill.mjs
      - name: Remove temporary patch machinery
        run: git rm scripts/patch-minute-fact-forward-fill.mjs .github/workflows/patch-minute-fact-forward-fill.yml
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Stop carrying validated streams across minutes"
          git push origin HEAD:agent/fix-minute-fact-stream-forward-fill
