name: D1 migration audit once

on:
  push:
    branches:
      - maintenance/d1-audit-report
    paths:
      - .github/workflows/d1-audit-once.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: d1-migration-audit-once
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CF_ACCOUNT_PREFIX: 0500f25c2f74e7e7
      CF_ACCOUNT_SUFFIX: 6c94a8bcb6c7008b

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Pages tooling
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Prepare credentials
        shell: bash
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${CF_ACCOUNT_PREFIX}${CF_ACCOUNT_SUFFIX}" >> "$GITHUB_ENV"
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'Cloudflare API token secret is missing'; exit 1; }

      - name: List unapplied remote migrations
        working-directory: site
        shell: bash
        run: |
          npx wrangler d1 migrations list stationhead-monitor --remote --config wrangler.jsonc > d1-audit-list.txt 2>&1
          cat d1-audit-list.txt

      - name: Read remote migration records and schema
        working-directory: site
        shell: bash
        run: |
          npx wrangler d1 execute stationhead-monitor --remote --config wrangler.jsonc --json \
            --command "SELECT 'migration' AS kind,name,NULL AS type,NULL AS tbl_name,NULL AS sql FROM d1_migrations UNION ALL SELECT 'schema' AS kind,name,type,tbl_name,sql FROM sqlite_master WHERE sql IS NOT NULL AND name NOT LIKE 'sqlite_%' ORDER BY kind,name;" \
            > d1-audit-remote.json

      - name: Simulate unapplied migrations locally
        working-directory: site
        run: node scripts/audit-d1-migrations.mjs

      - name: Publish audit report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ -f site/d1-audit-report.md ]; then
            cat site/d1-audit-report.md >> "$GITHUB_STEP_SUMMARY"
            gh pr comment 80 --body-file site/d1-audit-report.md
          else
            gh pr comment 80 --body "D1監査ワークフロー自体が失敗し、調査レポートを生成できませんでした。Actionsログを確認してください。"
          fi
