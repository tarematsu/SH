name: Diagnose host monitor split

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Capture patch diagnostics
        shell: bash
        run: |
          set -u
          cat .github/agent-host-split.patch.*.b64 > /tmp/agent-host-split.patch.b64
          base64 -d /tmp/agent-host-split.patch.b64 > /tmp/agent-host-split.patch 2>/tmp/base64-error.txt
          {
            wc -c /tmp/agent-host-split.patch.b64 /tmp/agent-host-split.patch
            sha256sum /tmp/agent-host-split.patch
            cat /tmp/base64-error.txt
            git apply --check /tmp/agent-host-split.patch
          } > .github/agent-host-split-debug.txt 2>&1
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/agent-host-split-debug.txt
          git commit -m "Capture host split patch diagnostics"
          git push origin HEAD:${{ github.head_ref }}
