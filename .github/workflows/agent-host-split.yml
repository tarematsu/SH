name: Apply host monitor split

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply validated patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/agent-host-split.patch.*.b64 | base64 -d > /tmp/agent-host-split.patch
          git apply --check /tmp/agent-host-split.patch
          git apply /tmp/agent-host-split.patch
          sed -i '/^# Temporary R2-only verification trigger;/d' .github/workflows/fetch-cloudflare-observability.yml
          rm .github/agent-host-split.patch.*.b64 .github/agent-host-split-debug.txt .github/workflows/agent-host-split.yml
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Isolate host monitor CPU work"
          git push origin HEAD:${{ github.head_ref }}
