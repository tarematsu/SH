name: Apply host monitor split

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply host monitor topology
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'replacement target missing: {path}: {old[:80]!r}')
              p.write_text(text.replace(old, new, 1))

          package = Path('worker/package.json')
          data = json.loads(package.read_text())
          scripts = data['scripts']
          scripts['deploy:host-monitor'] = 'wrangler deploy --config wrangler.host-monitor.jsonc'
          scripts['check:host-monitor-bundle'] = 'wrangler deploy --config wrangler.host-monitor.jsonc --dry-run --outdir=dist-host-monitor-dry-run'
          scripts['deploy:split-other'] = 'npm run deploy:pages-read-model && npm run deploy:monitor-maintenance && npm run deploy:other && npm run deploy:host-monitor && npm run deploy:buddy-playback'
          scripts['check:split-other-bundle'] = 'npm run check:pages-read-model-bundle && npm run check:monitor-maintenance-bundle && npm run check:other-bundle && npm run check:host-monitor-bundle && npm run check:buddy-playback-bundle'
          package.write_text(json.dumps(data, indent=2) + '\n')

          replace('worker/scripts/select-worker-deploys.mjs',
              "  { name: 'sh-monitor-other', config: 'worker/wrangler.other.jsonc', command: 'deploy:other' },\n",
              "  { name: 'sh-monitor-other', config: 'worker/wrangler.other.jsonc', command: 'deploy:other' },\n  { name: 'sh-host-monitor', config: 'worker/wrangler.host-monitor.jsonc', command: 'deploy:host-monitor' },\n")

          replace('worker/src/other-monitor-entry.js',
              "async function dispatchBuddyPlayback(env, now) {\n  if (!env?.BUDDY_PLAYBACK_QUEUE?.send) return null;\n  await env.BUDDY_PLAYBACK_QUEUE.send({\n    message_type: 'buddy-playback-stage',\n    message_version: 1,\n    scheduled_at: now,\n    observed_at: Date.now(),\n  }, { contentType: 'json' });\n  return { dispatched: true, task: 'buddy', scheduled_at: now };\n}\n",
              "async function dispatchQueue(env, binding, body) {\n  if (!env?.[binding]?.send) return null;\n  await env[binding].send(body, { contentType: 'json' });\n  return body;\n}\n\nasync function dispatchBuddyPlayback(env, now) {\n  const body = await dispatchQueue(env, 'BUDDY_PLAYBACK_QUEUE', {\n    message_type: 'buddy-playback-stage',\n    message_version: 1,\n    scheduled_at: now,\n    observed_at: Date.now(),\n  });\n  return body ? { dispatched: true, task: 'buddy', scheduled_at: now } : null;\n}\n\nasync function dispatchHostMonitor(env, now) {\n  const body = await dispatchQueue(env, 'HOST_MONITOR_QUEUE', {\n    message_type: 'host-monitor-task',\n    message_version: 1,\n    scheduled_at: now,\n    observed_at: Date.now(),\n  });\n  return body ? { dispatched: true, task: 'host', scheduled_at: now } : null;\n}\n")
          replace('worker/src/other-monitor-entry.js',
              "  }\n  const runner = dependencies[name] || await defaultRunner(name);\n",
              "  }\n  if (name === 'host') {\n    const dispatched = await dispatchHostMonitor(env, now);\n    if (dispatched) return dispatched;\n  }\n  const runner = dependencies[name] || await defaultRunner(name);\n")

          replace('worker/wrangler.other.jsonc',
              '      { "binding": "BUDDY_PLAYBACK_QUEUE", "queue": "stationhead-buddy-playback" }\n',
              '      { "binding": "BUDDY_PLAYBACK_QUEUE", "queue": "stationhead-buddy-playback" },\n      { "binding": "HOST_MONITOR_QUEUE", "queue": "stationhead-host-monitor" }\n')

          replace('.github/workflows/cloudflare-pr-diagnostics.yml',
              '            stationhead-buddy-playback stationhead-buddy-playback-dlq\n',
              '            stationhead-buddy-playback stationhead-buddy-playback-dlq \\\n            stationhead-host-monitor stationhead-host-monitor-dlq\n')

          p = Path('.github/workflows/fetch-cloudflare-observability.yml')
          text = p.read_text().replace('# Temporary R2-only verification trigger; this comment is removed after the artifact is captured.\n', '')
          old = "              'sh-monitor-other', 'sh-buddy-playback',"
          if old not in text:
              raise SystemExit('observability target insertion point missing')
          p.write_text(text.replace(old, "              'sh-monitor-other', 'sh-host-monitor', 'sh-buddy-playback',", 1))
          PY

          cat > worker/src/host-monitor-entry.js <<'EOF'
          import './fetch-guard.js';
          import { runCloudHostMonitor } from './cloud-host-monitor.js';

          function validateTask(body) {
            if (body?.message_type !== 'host-monitor-task' || Number(body?.message_version) !== 1) {
              throw new Error('unsupported host monitor task');
            }
            const scheduledAt = Number(body.scheduled_at);
            const observedAt = Number(body.observed_at);
            if (!Number.isFinite(scheduledAt) || !Number.isFinite(observedAt)) {
              throw new Error('host monitor task identity is invalid');
            }
            return { scheduledAt, observedAt };
          }

          export async function processHostMonitorTask(env, body, dependencies = {}) {
            const task = validateTask(body);
            const run = dependencies.run || runCloudHostMonitor;
            await run(env);
            return {
              event: 'host_monitor_task_completed',
              scheduled_at: task.scheduledAt,
              observed_at: task.observedAt,
              completed_at: Date.now(),
            };
          }

          export default {
            async queue(batch, env) {
              for (const message of batch.messages) {
                try {
                  const result = await processHostMonitorTask(env, message.body);
                  console.log(JSON.stringify(result));
                  message.ack();
                } catch (error) {
                  console.error(JSON.stringify({
                    event: 'host_monitor_task_failed',
                    error: String(error?.message || error).slice(0, 800),
                  }));
                  message.retry();
                }
              }
            },
          };
          EOF

          cat > worker/wrangler.host-monitor.jsonc <<'EOF'
          {
            "$schema": "node_modules/wrangler/config-schema.json",
            "name": "sh-host-monitor",
            "main": "src/host-monitor-entry.js",
            "compatibility_date": "2026-06-24",
            "workers_dev": false,
            "preview_urls": false,
            "logpush": true,
            "observability": { "enabled": true },
            "vars": {
              "HOST_PROFILE_HANDLE": "sakuramankai",
              "HOST_PROFILE_ACCOUNT_ID": 3334889,
              "HOST_PROFILE_INTERVAL_MS": 3600000,
              "SOLO_BROADCAST_HANDLE": "sakurazaka46jp",
              "SOLO_CONFIRM_POLLS": 2,
              "SOLO_END_CONFIRM_POLLS": 3,
              "SOLO_CHAT_LIMIT": 50,
              "SOLO_PROFILE_INTERVAL_MS": 3600000,
              "OFFICIAL_NEWS_EARLY_WINDOW_MS": 600000,
              "REQUEST_TIMEOUT_MS": 8000
            },
            "d1_databases": [
              { "binding": "BUDDIES_DB", "database_name": "stationhead-buddies", "database_id": "f361aae0-05f0-42bc-8784-77100e80133d" },
              { "binding": "MINUTE_DB", "database_name": "stationhead-minute", "database_id": "43c12c1e-886d-4496-9c37-61bc8a15bbd7" },
              { "binding": "OTHER_DB", "database_name": "stationhead-other", "database_id": "21e70e92-6725-4e62-809e-8aadb088cc11" }
            ],
            "queues": {
              "consumers": [
                {
                  "queue": "stationhead-host-monitor",
                  "max_batch_size": 1,
                  "max_batch_timeout": 1,
                  "max_retries": 8,
                  "dead_letter_queue": "stationhead-host-monitor-dlq",
                  "max_concurrency": 1
                }
              ]
            }
          }
          EOF

          cat > worker/tests/host-monitor-entry.test.js <<'EOF'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import test from 'node:test';

          import { processHostMonitorTask } from '../src/host-monitor-entry.js';
          import { OTHER_MONITOR_CRON, runOtherMonitorScheduled } from '../src/other-monitor-entry.js';

          test('host work is deferred to one dedicated Queue invocation', async () => {
            const sent = [];
            const result = await runOtherMonitorScheduled(
              { cron: OTHER_MONITOR_CRON, scheduledTime: Date.UTC(2026, 0, 1, 0, 25) },
              { HOST_MONITOR_QUEUE: { async send(body) { sent.push(body); } } },
              {},
              { officialNewsDue: async () => false, host: async () => assert.fail('host must be deferred') },
            );
            assert.equal(result[0].dispatched, true);
            assert.equal(result[0].task, 'host');
            assert.equal(sent[0].message_type, 'host-monitor-task');
          });

          test('dedicated host Worker validates and runs exactly one task', async () => {
            const calls = [];
            const result = await processHostMonitorTask({ OTHER_DB: {} }, {
              message_type: 'host-monitor-task',
              message_version: 1,
              scheduled_at: 123_000,
              observed_at: 123_456,
            }, { run: async (env) => calls.push(env) });
            assert.equal(calls.length, 1);
            assert.equal(result.event, 'host_monitor_task_completed');
            assert.equal(result.scheduled_at, 123_000);
          });

          test('host topology has one producer and one single-message consumer', () => {
            const other = JSON.parse(readFileSync(new URL('../wrangler.other.jsonc', import.meta.url), 'utf8'));
            const host = JSON.parse(readFileSync(new URL('../wrangler.host-monitor.jsonc', import.meta.url), 'utf8'));
            assert.equal(other.queues.producers.some(({ binding }) => binding === 'HOST_MONITOR_QUEUE'), true);
            assert.equal(host.name, 'sh-host-monitor');
            assert.equal(host.queues.consumers[0].queue, 'stationhead-host-monitor');
            assert.equal(host.queues.consumers[0].max_batch_size, 1);
            assert.equal(host.triggers, undefined);
          });
          EOF

          rm -f .github/agent-host-split.patch.*.b64 .github/agent-host-split-debug.txt .github/workflows/agent-host-split.yml
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Isolate host monitor CPU work"
          git push origin HEAD:${{ github.head_ref }}
