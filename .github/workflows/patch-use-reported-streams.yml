name: Apply reported stream count changes

on:
  push:
    branches:
      - agent/fix-minute-fact-stream-forward-fill
    paths:
      - scripts/patch-use-reported-streams.mjs
      - .github/workflows/patch-use-reported-streams.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-minute-fact-stream-forward-fill
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply changes
        run: node scripts/patch-use-reported-streams.mjs
      - name: Remove temporary patch files
        run: git rm scripts/patch-use-reported-streams.mjs .github/workflows/patch-use-reported-streams.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use reported stream count as total streams"
          git push origin HEAD:agent/fix-minute-fact-stream-forward-fill
