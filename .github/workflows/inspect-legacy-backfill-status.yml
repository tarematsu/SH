name: Inspect legacy backfill status

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: site
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Inspect production legacy migration
        shell: bash
        run: |
          set -u
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_BUILDS_API_TOKEN:-}"
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            export CLOUDFLARE_ACCOUNT_ID="${CF_ACCOUNT_ID:-}"
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] && [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            export CLOUDFLARE_ACCOUNT_ID="$(curl -fsS \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              https://api.cloudflare.com/client/v4/accounts \
              | jq -r '.result[0].id // empty')"
          fi

          : > legacy-backfill-status.log
          run_query() {
            label="$1"
            sql="$2"
            echo "=== ${label} ===" >> legacy-backfill-status.log
            set +e
            npx wrangler d1 execute stationhead-monitor --remote --json --command="${sql}" \
              >> legacy-backfill-status.log 2>&1
            status=$?
            set -e
            echo "exit_status=${status}" >> legacy-backfill-status.log
          }

          set -e
          run_query legacy_table "SELECT COUNT(*) AS legacy_rows,MIN(id) AS legacy_min_id,MAX(id) AS legacy_max_id,MIN(observed_at) AS first_observed_at,MAX(observed_at) AS last_observed_at FROM sh_legacy_snapshots;"
          run_query schema_objects "SELECT type,name FROM sqlite_master WHERE name LIKE 'sh_legacy_%' OR name LIKE '%migration%' ORDER BY type,name;"
          run_query maintenance_columns "PRAGMA table_info(sh_data_maintenance_state);"
          run_query migration_history "SELECT * FROM d1_migrations ORDER BY id DESC LIMIT 15;"
          cat legacy-backfill-status.log
      - name: Upload inspection result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-backfill-status
          path: site/legacy-backfill-status.log
