name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: all
        options:
          - all
          - pages
          - workers
          - ingest
          - minute-enrichment
          - sakurazaka46jp
          - runtime

permissions:
  contents: read

concurrency:
  group: deploy-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pages:
    name: Pages
    if: ${{ inputs.target == 'all' || inputs.target == 'pages' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: site
      - run: npx wrangler pages deploy public --project-name skrzk --branch main
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || '0500f25c2f74e7e76c94a8bcb6c7008b' }}

  workers:
    name: Workers
    if: ${{ inputs.target != 'pages' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || '0500f25c2f74e7e76c94a8bcb6c7008b' }}
      DEPLOY_TARGET: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - name: Ensure queues
        working-directory: worker
        shell: bash
        run: |
          for queue in \
            stationhead-raw-collection stationhead-raw-collection-dlq \
            stationhead-buddies-persist stationhead-buddies-persist-dlq \
            stationhead-ingest-finalize stationhead-ingest-finalize-dlq \
            stationhead-comments stationhead-comments-dlq \
            stationhead-read-model stationhead-read-model-dlq \
            stationhead-track-metadata stationhead-track-metadata-dlq \
            stationhead-buddies-facts stationhead-buddies-facts-dlq \
            stationhead-minute-derive stationhead-minute-derive-dlq \
            stationhead-minute-live-derive stationhead-minute-live-derive-dlq \
            stationhead-minute-enrichment stationhead-minute-enrichment-dlq \
            stationhead-minute-rebuild stationhead-minute-rebuild-dlq \
            stationhead-host-monitor stationhead-host-monitor-dlq \
            stationhead-sakurazaka46jp stationhead-sakurazaka46jp-dlq \
            stationhead-pages-read-model-publication stationhead-pages-read-model-publication-dlq
          do
            npx wrangler queues create "$queue" >/dev/null 2>&1 || true
          done
      - name: Deploy selected Workers
        shell: bash
        working-directory: worker
        run: |
          set -euo pipefail
          case "$DEPLOY_TARGET" in
            all|workers)
              commands=(deploy:minute-enrichment deploy:ingest deploy:sakurazaka46jp deploy:runtime)
              ;;
            ingest)
              commands=(deploy:ingest)
              ;;
            minute-enrichment)
              commands=(deploy:minute-enrichment)
              ;;
            sakurazaka46jp)
              commands=(deploy:sakurazaka46jp)
              ;;
            runtime)
              commands=(deploy:runtime)
              ;;
            *)
              echo "Unsupported Worker target: $DEPLOY_TARGET" >&2
              exit 1
              ;;
          esac
          for command in "${commands[@]}"; do
            npm run "$command"
          done
