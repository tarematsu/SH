name: D1 foundation migration once

on:
  push:
    branches:
      - maintenance/d1-foundation-run
    paths:
      - .github/workflows/d1-foundation-once.yml

permissions:
  contents: read

concurrency:
  group: d1-foundation-migration-once
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CF_PAGES_BRANCH: main
      D1_MIGRATION_NAME: 003_email_stream_snapshots.sql
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Pages tooling
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Verify required credentials exist
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'Cloudflare API token secret is missing'; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo 'Cloudflare account ID secret or variable is missing'; exit 1; }

      - name: Run focused local migration test
        working-directory: site
        run: npm run test:d1:email-foundation

      - name: Apply only the selected migration to remote D1
        working-directory: site
        run: npm run db:migrate

      - name: Verify the remote table exists
        working-directory: site
        run: >-
          npx wrangler d1 execute stationhead-monitor --remote
          --command "SELECT name FROM sqlite_master WHERE type='table' AND name='sh_email_stream_snapshots';"
