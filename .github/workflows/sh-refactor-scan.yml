name: SH refactor source scan

on:
  push:
    branches:
      - automation/sh-refactor-scan
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Stationhead
        uses: actions/checkout@v4
        with:
          path: Stationhead
          fetch-depth: 0
      - name: Build source archive and occurrence report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          python - <<'PY'
          import json
          import pathlib
          import re
          import subprocess

          root = pathlib.Path('Stationhead')
          tracked = subprocess.check_output(
              ['git', '-C', str(root), 'ls-files', '-z']
          ).decode().split('\0')
          tracked = [p for p in tracked if p]
          commit = subprocess.check_output(
              ['git', '-C', str(root), 'rev-parse', 'HEAD'], text=True
          ).strip()
          tree = subprocess.check_output(
              ['git', '-C', str(root), 'rev-parse', 'HEAD^{tree}'], text=True
          ).strip()
          entries = []
          path_hits = []
          content_hits = []
          for rel in tracked:
              mode_type_sha = subprocess.check_output(
                  ['git', '-C', str(root), 'ls-tree', 'HEAD', '--', rel], text=True
              ).strip().split(None, 3)
              if len(mode_type_sha) >= 3:
                  entries.append({'path': rel, 'mode': mode_type_sha[0], 'type': mode_type_sha[1], 'sha': mode_type_sha[2]})
              if re.search('stationhead', rel, re.I):
                  path_hits.append(rel)
              path = root / rel
              try:
                  data = path.read_bytes()
              except OSError:
                  continue
              if b'\0' in data[:8192]:
                  continue
              try:
                  text = data.decode('utf-8')
              except UnicodeDecodeError:
                  continue
              for number, line in enumerate(text.splitlines(), 1):
                  if re.search('stationhead', line, re.I):
                      content_hits.append({'path': rel, 'line': number, 'text': line[:1000]})
          report = {
              'Stationhead': {
                  'commit': commit,
                  'tree': tree,
                  'tracked': entries,
                  'path_hits': path_hits,
                  'content_hits': content_hits,
              }
          }
          pathlib.Path('out/report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          git -C Stationhead archive --format=tar.gz --output=../out/Stationhead.tar.gz HEAD
      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: sh-refactor-scan-stationhead
          path: out
          retention-days: 3
