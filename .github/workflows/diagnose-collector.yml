name: diagnose-collector

on:
  pull_request:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Compact collector probe
        shell: bash
        run: |
          set -euo pipefail
          date -u '+utc=%Y-%m-%dT%H:%M:%SZ'
          curl -fsS --max-time 30 https://stationhead-monitor-collector.tarematsu.workers.dev/health > /tmp/h.json
          curl -fsS --max-time 30 'https://skrzk.pages.dev/api/dashboard' > /tmp/d.json
          python3 - <<'PY'
          import json, datetime
          JST=datetime.timezone(datetime.timedelta(hours=9))
          h=json.load(open('/tmp/h.json'))
          d=json.load(open('/tmp/d.json'))
          keys=['last_run_at','last_success_at','last_error','collector_lease_until','collector_lease_healthy','auth_token_expires_at','auth_last_error','official_news_last_success_at','official_news_last_error','cloud_host_last_success_at','cloud_host_last_error']
          for k in keys:
              v=h.get(k)
              if isinstance(v,(int,float)) and v:
                  v=f'{v} ({datetime.datetime.fromtimestamp(v/1000,JST).isoformat()})'
              print(f'health.{k}={v}')
          for k in ['latest_observed_at','generated_at']:
              v=d.get(k)
              if isinstance(v,(int,float)) and v:
                  v=f'{v} ({datetime.datetime.fromtimestamp(v/1000,JST).isoformat()})'
              print(f'dashboard.{k}={v}')
          latest=d.get('latest') or {}
          print('dashboard.latest.observed_at=',latest.get('observed_at'))
          PY
