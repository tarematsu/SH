name: Provision runtime analytics Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provision-runtime-analytics-pipeline
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets['CLOUDFLARE_BUILDS_API_TOKEN'] || secrets['CLOUDFLARE_API_TOKEN'] || secrets['CF_API_TOKEN'] }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets['CLOUDFLARE_ACCOUNT_ID'] || secrets['CF_ACCOUNT_ID'] || '0500f25c2f74e7e76c94a8bcb6c7008b' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Worker dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: worker
      - name: Create stream, R2 bucket, Parquet sink, SQL pipeline, and Worker binding
        run: npm run deploy:runtime
        working-directory: worker
