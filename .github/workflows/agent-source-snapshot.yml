name: Apply agent CPU rework

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/agent-cpu.patch.*.b64 | base64 -d > /tmp/agent-cpu.patch
          git apply --check /tmp/agent-cpu.patch
          git apply /tmp/agent-cpu.patch
          rm .github/agent-cpu.patch.*.b64
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Split remaining CPU hot paths"
          git push origin HEAD:${{ github.head_ref }}
