name: Agent source snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive source
        run: tar --exclude=.git -czf /tmp/source.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: agent-source-${{ github.run_id }}
          path: /tmp/source.tgz
          retention-days: 1
