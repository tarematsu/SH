name: Apply minute rebuild gap split

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/agent-gap-split.patch.b64 > /tmp/agent-gap-split.patch
          git apply --check /tmp/agent-gap-split.patch
          git apply /tmp/agent-gap-split.patch
          rm .github/agent-gap-split.patch.b64 .github/workflows/agent-gap-split.yml
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Split minute rebuild gap scan CPU work"
          git push origin HEAD:${{ github.head_ref }}
