name: Apply minute rebuild gap split

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/agent-gap-split.patch.*.b64 > /tmp/agent-gap-split.patch.b64
          test "$(git hash-object /tmp/agent-gap-split.patch.b64)" = "9ce6a9d4dc6d03290e5645bf439f635a6b618283"
          base64 -d /tmp/agent-gap-split.patch.b64 > /tmp/agent-gap-split.patch
          echo "4878a2df99a99668ae201e6e845e1da7ec6159da18e274d049bf91a20c6e30c8  /tmp/agent-gap-split.patch" | sha256sum -c -
          git apply --check /tmp/agent-gap-split.patch
          git apply /tmp/agent-gap-split.patch
          rm .github/agent-gap-split.patch.*.b64 .github/workflows/agent-gap-split.yml
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Split minute rebuild gap scan CPU work"
          git push origin HEAD:${{ github.head_ref }}
