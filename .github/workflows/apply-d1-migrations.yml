name: Apply D1 migrations

on:
  push:
    branches:
      - main
    paths:
      - 'database/migrations/**'
      - 'site/scripts/apply-d1-migrations.mjs'
      - 'site/wrangler.jsonc'
      - '.github/workflows/apply-d1-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stationhead-d1-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    env:
      D1_MIGRATION_FORCE: 'true'
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Apply every pending remote D1 migration
        run: npm run db:migrate
