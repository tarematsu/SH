name: Apply D1 migrations
# Verification trigger: 2026-07-05

on:
  push:
    branches:
      - main
    paths:
      - 'database/migrations/**'
      - 'site/scripts/apply-d1-migrations.mjs'
      - 'site/wrangler.jsonc'
      - '.github/workflows/apply-d1-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: stationhead-d1-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    env:
      D1_MIGRATION_FORCE: 'true'
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Apply and verify every pending remote D1 migration
        id: migrate
        shell: bash
        run: |
          set +e
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN="$CLOUDFLARE_BUILDS_API_TOKEN"
          fi
          npm run db:migrate 2>&1 | tee migration.log
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 0 ]; then
            npx wrangler d1 migrations list stationhead-monitor --remote --config wrangler.jsonc 2>&1 | tee -a migration.log
            verify_status=${PIPESTATUS[0]}
            if [ "$verify_status" -ne 0 ]; then
              status=$verify_status
            fi
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Post migration audit
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MIGRATION_EXIT_CODE: ${{ steps.migrate.outputs.exit_code }}
        run: |
          if [ "${MIGRATION_EXIT_CODE:-1}" = "0" ]; then
            result='SUCCESS'
          else
            result='FAILURE'
          fi
          {
            echo "## Remote D1 migration run: ${result}"
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Exit code: ${MIGRATION_EXIT_CODE:-missing}"
            echo
            echo '```text'
            tail -n 120 migration.log 2>/dev/null || echo 'migration.log was not created'
            echo '```'
          } > migration-audit.md
          gh issue comment 112 --repo "$GITHUB_REPOSITORY" --body-file migration-audit.md
      - name: Fail when migration failed
        if: steps.migrate.outputs.exit_code != '0'
        run: exit 1
