name: Verify production facts schema

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/verify-production-facts.yml'
      - 'database/facts-migrations/**'
      - 'worker/scripts/provision-facts-db.mjs'
      - 'worker/scripts/verify-facts-live.mjs'
      - 'tests/facts-isrc-migration.test.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-production-facts.yml'
      - 'database/facts-migrations/**'
      - 'worker/scripts/provision-facts-db.mjs'
      - 'worker/scripts/verify-facts-live.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-production-facts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify stationhead-minute schema and freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      FACTS_DATABASE_NAME: stationhead-minute
      FACTS_VERIFY_ATTEMPTS: '3'
      FACTS_VERIFY_DELAY_MS: '10000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Verify live facts and required schema
        run: node scripts/verify-facts-live.mjs
      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-facts-verification-${{ github.run_id }}
          path: database/facts-live-verification.json
          if-no-files-found: error
          retention-days: 7
