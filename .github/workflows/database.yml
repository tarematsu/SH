name: Database operations

on:
  push:
    branches:
      - main
    paths:
      - 'database/facts-migrations/**'
      - 'worker/scripts/provision-facts-db.mjs'
      - 'worker/scripts/verify-facts-live.mjs'
      - 'database/other-migrations/**'
      - 'worker/scripts/provision-other-db.mjs'
  workflow_dispatch:
    inputs:
      operation:
        description: Database operation
        required: true
        type: choice
        options:
          - site-migrations
          - facts-db
          - other-db

permissions:
  contents: read

concurrency:
  group: sh-database-operations
  cancel-in-progress: false

jobs:
  site-migrations:
    name: Apply site D1 migrations
    if: inputs.operation == 'site-migrations'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    env:
      D1_MIGRATION_FORCE: 'true'
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Apply migrations
        run: npm run db:migrate
      - name: Verify schema
        run: npm run db:verify

  facts-db:
    name: Provision or update Stationhead-DB
    if: github.event_name == 'push' || inputs.operation == 'facts-db'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      FACTS_DATABASE_NAME: Stationhead-DB
      FACTS_VERIFY_ATTEMPTS: '5'
      FACTS_VERIFY_DELAY_MS: '20000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Create or update database
        run: node scripts/provision-facts-db.mjs
      - name: Verify live data
        run: node scripts/verify-facts-live.mjs

  other-db:
    name: Provision or update stationhead-other
    if: github.event_name == 'push' || inputs.operation == 'other-db'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      OTHER_DATABASE_NAME: stationhead-other
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Create or update database
        run: node scripts/provision-other-db.mjs
