name: Database operations

on:
  push:
    branches:
      - main
    paths:
      - 'database/other-migrations/**'
      - 'worker/scripts/provision-other-db.mjs'
      - 'worker/scripts/consolidate-track-metadata.mjs'
      - 'database/buddies-migrations/**'
      - 'worker/scripts/provision-buddies-db.mjs'
      - 'worker/scripts/buddies-db-tables.mjs'
      - 'worker/scripts/buddies-db-export.mjs'
      - 'worker/scripts/sync-buddies-db.mjs'
  workflow_call:
    inputs:
      operation:
        description: Database operation
        required: true
        type: string
      base_sha:
        description: Base commit used to select deployment migrations
        required: false
        default: ''
        type: string
      head_sha:
        description: Head commit used to select deployment migrations
        required: false
        default: ''
        type: string
      drop_source_metadata:
        description: Delete the legacy OTHER_DB metadata table after verification
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      operation:
        description: Database operation
        required: true
        type: choice
        options:
          - minute-db
          - payload-purge
          - other-db
          - buddies-db
          - metadata-consolidation
      drop_source_metadata:
        description: Delete the legacy OTHER_DB metadata table after verification
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: sh-database-operations-v2-${{ inputs.operation || github.event_name }}
  cancel-in-progress: false

jobs:
  minute-db:
    name: Apply MINUTE_DB schema
    if: inputs.operation == 'minute-db'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      FACTS_DATABASE_NAME: stationhead-minute
      FACTS_DEPLOY_CHANGED_ONLY: 'true'
      DEPLOY_BASE_SHA: ${{ inputs.base_sha || '' }}
      DEPLOY_HEAD_SHA: ${{ inputs.head_sha || github.sha }}
      FACTS_VERIFY_ATTEMPTS: '5'
      FACTS_VERIFY_DELAY_MS: '20000'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Apply changed MINUTE_DB migrations
        run: node scripts/apply-facts-pr-schema.mjs
      - name: Verify live data and deployment-critical schema
        run: node scripts/verify-facts-live.mjs

  payload-purge:
    name: Drain existing stationhead-minute payload backlog
    if: inputs.operation == 'payload-purge'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      FACTS_DATABASE_NAME: stationhead-minute
      MINUTE_FACT_PAYLOAD_PURGE_BATCH_SIZE: '1000'
      MINUTE_FACT_PAYLOAD_PURGE_STATEMENTS_PER_REQUEST: '20'
      MINUTE_FACT_PAYLOAD_PURGE_MAX_BATCHES: '10000'
      MINUTE_FACT_PAYLOAD_PURGE_MAX_ATTEMPTS: '6'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Drain all eligible payload backlog
        run: node scripts/purge-completed-minute-fact-payloads.mjs

  other-db:
    name: Provision or update stationhead-other
    if: github.event_name == 'push' || inputs.operation == 'other-db'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      OTHER_DATABASE_NAME: stationhead-other
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Create or update database
        run: node scripts/provision-other-db.mjs

  metadata-consolidation:
    name: Consolidate shared track metadata
    if: inputs.operation == 'metadata-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      TRACK_METADATA_APPLY: 'true'
      TRACK_METADATA_DROP_SOURCE: ${{ inputs.drop_source_metadata }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Copy and verify shared metadata
        run: node scripts/consolidate-track-metadata.mjs

  buddies-db:
    name: Provision or update stationhead-buddies
    if: github.event_name == 'push' || inputs.operation == 'buddies-db'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      BUDDIES_DATABASE_NAME: stationhead-buddies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Create or update database
        run: node scripts/provision-buddies-db.mjs
