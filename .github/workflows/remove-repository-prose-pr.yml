name: Remove repository prose on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/remove-repository-prose-20260711' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-repository-prose-20260711
          fetch-depth: 0
      - name: Remove documents and comments
        run: python3 .github/scripts/remove-repository-prose.py
      - name: Commit cleanup
        shell: bash
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove repository documentation and comments"
          git push origin HEAD:agent/remove-repository-prose-20260711
