name: Remove repository prose on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: startsWith(github.head_ref, 'agent/remove-repository-prose') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Remove documents and comments
        run: python3 .github/scripts/remove-repository-prose.py
      - name: Check generated diff
        run: git diff --check
      - name: Commit generated cleanup
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove repository documentation and comments"
      - name: Push generated cleanup
        run: git push origin HEAD:${{ github.head_ref }}
