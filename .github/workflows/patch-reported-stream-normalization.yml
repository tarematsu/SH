name: Apply reported stream normalization

on:
  push:
    branches:
      - agent/fix-minute-fact-stream-forward-fill
    paths:
      - scripts/patch-reported-stream-normalization.mjs
      - .github/workflows/patch-reported-stream-normalization.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-minute-fact-stream-forward-fill
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/patch-reported-stream-normalization.mjs
      - run: git rm scripts/patch-reported-stream-normalization.mjs .github/workflows/patch-reported-stream-normalization.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize reported stream storage"
          git push origin HEAD:agent/fix-minute-fact-stream-forward-fill
