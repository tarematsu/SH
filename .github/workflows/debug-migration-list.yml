name: Debug migration list

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture migration files
        shell: bash
        run: |
          find database/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort > migration-files.txt
          awk -F_ '{count[$1]++; files[$1]=files[$1] " " $0} END {for (n in count) if (count[n] > 1) print n ":" files[n]}' migration-files.txt | sort > migration-duplicates.txt
          cat migration-duplicates.txt
      - uses: actions/upload-artifact@v4
        with:
          name: migration-list
          path: |
            migration-files.txt
            migration-duplicates.txt
