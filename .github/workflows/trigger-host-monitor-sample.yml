name: Trigger host monitor CPU sample

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trigger:
    if: github.head_ref == 'agent/cpu-under-10-root-rework'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "0500f25c2f74e7e76c94a8bcb6c7008b"
    steps:
      - name: Publish one host monitor task
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          queues="$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/queues?per_page=100")"
          queue_id="$(jq -er '.result[] | select(.queue_name == "stationhead-host-monitor") | .queue_id' <<<"$queues")"
          now_ms="$(date +%s%3N)"
          response="$(curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H 'Content-Type: application/json' \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/queues/$queue_id/messages" \
            --data "{\"body\":{\"message_type\":\"host-monitor-task\",\"message_version\":1,\"scheduled_at\":$now_ms,\"observed_at\":$now_ms}}")"
          jq -e '.success == true' <<<"$response" >/dev/null
