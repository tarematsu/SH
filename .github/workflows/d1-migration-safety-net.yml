name: D1 migration safety net

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stationhead-d1-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    env:
      D1_MIGRATION_FORCE: 'true'
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Apply any remaining migrations
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN="$CLOUDFLARE_BUILDS_API_TOKEN"
          fi
          npm run db:migrate
      - name: Verify remote schema
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN="$CLOUDFLARE_BUILDS_API_TOKEN"
          fi
          npm run db:verify
