name: Provision minute facts D1

on:
  push:
    branches:
      - agent/new-minute-facts
    paths:
      - database/facts-migrations/**
      - worker/scripts/provision-facts-db.mjs
      - .github/workflows/provision-minute-facts-db.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/new-minute-facts
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install worker dependencies
        working-directory: worker
        run: npm ci
      - name: Create database and apply schema
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          FACTS_DATABASE_NAME: sh-monitor-facts
        run: node scripts/provision-facts-db.mjs
      - name: Commit generated D1 binding
        run: |
          if git diff --quiet -- worker/wrangler.jsonc database/facts-db.json; then
            echo "D1 binding already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/wrangler.jsonc database/facts-db.json
          git commit -m "Configure minute facts D1 binding"
          git push origin HEAD:agent/new-minute-facts
