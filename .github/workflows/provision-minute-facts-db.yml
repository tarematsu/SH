# Creates the dedicated minute-facts D1 and verifies the Cloudflare Git deployment.
name: Provision Stationhead-DB

on:
  push:
    branches:
      - main
      - agent/new-minute-facts
    paths:
      - database/facts-migrations/**
      - database/facts-db.json
      - worker/wrangler.jsonc
      - worker/scripts/provision-facts-db.mjs
      - worker/scripts/verify-facts-live.mjs
      - .github/workflows/provision-minute-facts-db.yml
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - database/facts-migrations/**
      - worker/scripts/provision-facts-db.mjs
      - worker/scripts/verify-facts-live.mjs
      - .github/workflows/provision-minute-facts-db.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stationhead-db-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund
      - name: Create database and apply schema
        id: provision
        continue-on-error: true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          FACTS_DATABASE_NAME: Stationhead-DB
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "result=missing-cloudflare-api-token" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
          if node scripts/provision-facts-db.mjs; then
            echo "result=success" >> "${GITHUB_OUTPUT}"
          else
            echo "result=provision-command-failed" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
      - name: Verify Cloudflare Git deployment
        id: verify
        if: steps.provision.outcome == 'success' && github.event_name != 'pull_request'
        continue-on-error: true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          FACTS_DATABASE_NAME: Stationhead-DB
          FACTS_VERIFY_ATTEMPTS: 5
          FACTS_VERIFY_DELAY_MS: 20000
        run: node scripts/verify-facts-live.mjs
      - name: Record provisioning status
        if: always() && github.event_name != 'pull_request'
        env:
          PROVISION_RESULT: ${{ steps.provision.outputs.result || 'unknown-failure' }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome || 'not-run-on-pull-request' }}
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          node --input-type=module <<'NODE'
          import { mkdirSync, writeFileSync } from 'node:fs';
          mkdirSync('database', { recursive: true });
          writeFileSync('database/facts-provision-status.json', `${JSON.stringify({
            database_name: 'Stationhead-DB',
            deployment_path: 'cloudflare_git',
            provision_result: process.env.PROVISION_RESULT,
            provision_outcome: process.env.PROVISION_OUTCOME,
            live_verify_outcome: process.env.VERIFY_OUTCOME,
            event_name: process.env.EVENT_NAME,
            source_sha: process.env.SOURCE_SHA,
            recorded_at: new Date().toISOString(),
          }, null, 2)}\n`);
          NODE
      - name: Commit generated binding and verification evidence
        if: always() && github.event_name != 'pull_request'
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A worker/wrangler.jsonc database
          if git diff --cached --quiet; then
            echo "D1 evidence already current"
            exit 0
          fi
          git commit -m "Record Stationhead-DB deployment"
          git push origin "HEAD:${TARGET_BRANCH}"
      - name: Fail unsuccessful provisioning
        if: steps.provision.outcome != 'success'
        run: |
          echo "Stationhead-DB provisioning failed: ${{ steps.provision.outputs.result || 'unknown-failure' }}"
          exit 1
      - name: Fail missing live data
        if: github.event_name != 'pull_request' && steps.verify.outcome != 'success'
        run: |
          echo "Stationhead-DB live verification=${{ steps.verify.outcome }}"
          exit 1
