name: Refresh code search index

on:
  schedule:
    # Every 6 hours. GitHub cron is evaluated in UTC.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-code-search-index
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TARGET_REPOSITORY: tarematsu/SH
      SEARCH_URL: "https://github.com/search?q=repo%3Atarematsu%2FSH%20&type=code"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Request authenticated code search
        shell: bash
        run: |
          set -euo pipefail

          query="index_refresh_${GITHUB_RUN_ID} repo:${TARGET_REPOSITORY}"
          encoded_query="$(jq -rn --arg value "$query" '$value | @uri')"

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-all-errors \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/search/code?q=${encoded_query}&per_page=1" \
            > /dev/null

      - name: Access web code search page
        shell: bash
        run: |
          set -euo pipefail

          status="$(curl \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 60 \
            --user-agent "Mozilla/5.0 GitHub-Actions-Code-Search-Refresh" \
            --output /dev/null \
            --write-out '%{http_code}' \
            "$SEARCH_URL")"

          echo "Web search response: HTTP ${status}"
          [[ "$status" =~ ^2[0-9][0-9]$ ]]
