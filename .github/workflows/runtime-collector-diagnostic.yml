name: Apply and validate stalled collector recovery

on:
  push:
    branches:
      - fix/runtime-collector-stall-20260704

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: runtime-collector-recovery
  cancel-in-progress: false

jobs:
  repair-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply collector recovery patch
        shell: bash
        run: |
          set -euo pipefail
          if grep -q 'class CollectionTimeoutError' worker/src/index.js; then
            echo 'Collector recovery patch is already present.'
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {text.count(old)}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'worker/src/index.js',
              "const DEFAULT_USER_AGENT = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36';\nlet collectionFlight = null;",
              "const DEFAULT_USER_AGENT = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36';\nconst DEFAULT_COLLECTION_TIMEOUT_MS = 90_000;\nconst MIN_COLLECTION_TIMEOUT_MS = 10_000;\nconst MAX_COLLECTION_TIMEOUT_MS = 170_000;\nlet collectionFlight = null;\nlet collectionFlightSequence = 0;",
          )

          replace_once(
              'worker/src/index.js',
              "export function runCollection(env, source = 'manual', collector = collectOnce) {\n  if (collectionFlight) return collectionFlight;\n  collectionFlight = Promise.resolve()\n    .then(() => collector(env, source))\n    .finally(() => { collectionFlight = null; });\n  return collectionFlight;\n}\n\nexport function resetCollectionFlight() {\n  collectionFlight = null;\n}",
              "function collectionTimeoutMs(env = {}, overrideMs = null) {\n  if (overrideMs != null) {\n    const override = Number(overrideMs);\n    if (Number.isFinite(override) && override > 0) return override;\n  }\n  const configured = Number(env.COLLECTION_TIMEOUT_MS ?? DEFAULT_COLLECTION_TIMEOUT_MS);\n  if (!Number.isFinite(configured)) return DEFAULT_COLLECTION_TIMEOUT_MS;\n  return Math.max(MIN_COLLECTION_TIMEOUT_MS, Math.min(MAX_COLLECTION_TIMEOUT_MS, configured));\n}\n\nexport class CollectionTimeoutError extends Error {\n  constructor(timeoutMs, source) {\n    super(`Stationhead collection timed out after ${timeoutMs}ms (${source})`);\n    this.name = 'CollectionTimeoutError';\n    this.code = 'COLLECTION_TIMEOUT';\n    this.timeoutMs = timeoutMs;\n    this.source = source;\n  }\n}\n\nexport function runCollection(env, source = 'manual', collector = collectOnce, options = {}) {\n  if (collectionFlight) return collectionFlight.promise;\n\n  const timeoutMs = collectionTimeoutMs(env, options.timeoutMs);\n  const sequence = ++collectionFlightSequence;\n  let timeoutId = null;\n  const operation = Promise.resolve().then(() => collector(env, source));\n  const timeout = new Promise((resolve, reject) => {\n    timeoutId = setTimeout(() => reject(new CollectionTimeoutError(timeoutMs, source)), timeoutMs);\n  });\n  const promise = Promise.race([operation, timeout]).finally(() => {\n    if (timeoutId != null) clearTimeout(timeoutId);\n    if (collectionFlight?.sequence === sequence) collectionFlight = null;\n  });\n\n  collectionFlight = { sequence, startedAt: Date.now(), promise };\n  return promise;\n}\n\nexport function resetCollectionFlight() {\n  collectionFlight = null;\n  collectionFlightSequence += 1;\n}",
          )

          replace_once(
              'worker/src/optimized-index.js',
              "    } catch (error) {\n      console.error(error);\n    }\n  },\n\n  async fetch(request, env, ctx) {",
              "    } catch (error) {\n      console.error(error);\n      throw error;\n    }\n  },\n\n  async fetch(request, env, ctx) {",
          )

          replace_once(
              'worker/src/email-recap-index.js',
              "  async scheduled(controller, env, ctx) {\n    await renewCloudLease(env).catch((error) => {\n      console.error(JSON.stringify({ event: 'collector_lease_failed', error: String(error?.message || error) }));\n    });\n    await app.scheduled(controller, env, ctx);\n    ctx.waitUntil(runCloudHostMonitor(env));\n  },",
              "  async scheduled(controller, env, ctx) {\n    await app.scheduled(controller, env, ctx);\n    await renewCloudLease(env);\n    ctx.waitUntil(runCloudHostMonitor(env));\n  },",
          )

          replace_once(
              'worker/src/main.js',
              "  async scheduled(controller, env, ctx) {\n    const runStartedAt = Date.now();\n    await app.scheduled(controller, env, ctx);\n    await expireLeaseWhenPrimaryFailed(env, runStartedAt);\n    ctx.waitUntil(runCloudWeeklyLeaderboard(env));\n  },",
              "  async scheduled(controller, env, ctx) {\n    const runStartedAt = Date.now();\n    let appError = null;\n    let leaseError = null;\n\n    try {\n      await app.scheduled(controller, env, ctx);\n    } catch (error) {\n      appError = error;\n    }\n\n    try {\n      await expireLeaseWhenPrimaryFailed(env, runStartedAt);\n    } catch (error) {\n      leaseError = error;\n    }\n\n    if (appError) {\n      if (leaseError) {\n        console.error(JSON.stringify({\n          event: 'collector_lease_expiry_failed',\n          error: String(leaseError?.message || leaseError),\n        }));\n      }\n      throw appError;\n    }\n    if (leaseError) throw leaseError;\n\n    ctx.waitUntil(runCloudWeeklyLeaderboard(env));\n  },",
          )

          replace_once(
              'worker/src/health-alert-index.js',
              "    const collectorHealth = await getCollectorHealthView(env).catch((error) => ({\n      collector_health_ok: false,\n      collector_health_error_present: true,\n      collector_health_error: sanitizeFailureDetail(error?.message || error),\n    }));\n    return Response.json(sanitizeHealthPayload({\n      ...payload,\n      ...collectorHealth,\n    }), {\n      status: healthResponseStatus(response.status, collectorHealth),\n    });",
              "    const [collectorHealth, diagnosticHealth] = await Promise.all([\n      getCollectorHealthView(env).catch((error) => ({\n        collector_health_ok: false,\n        collector_health_error_present: true,\n        collector_health_error: sanitizeFailureDetail(error?.message || error),\n      })),\n      diagnosticHealthView(env),\n    ]);\n    const combinedHealth = { ...collectorHealth, ...diagnosticHealth };\n    return Response.json(sanitizeHealthPayload({\n      ...payload,\n      ...combinedHealth,\n    }), {\n      status: healthResponseStatus(response.status, combinedHealth),\n    });",
          )

          replace_once(
              'worker/wrangler.jsonc',
              '    "REQUEST_TIMEOUT_MS": 20000,\n',
              '    "REQUEST_TIMEOUT_MS": 20000,\n    "COLLECTION_TIMEOUT_MS": 90000,\n',
          )

          Path('tests/worker-collection-flight.test.mjs').write_text(r'''import test from 'node:test';
          import assert from 'node:assert/strict';

          import {
            CollectionTimeoutError,
            resetCollectionFlight,
            runCollection,
          } from '../worker/src/index.js';

          test.afterEach(() => resetCollectionFlight());

          test('concurrent collection callers share the active flight', async () => {
            let resolveCollection;
            let calls = 0;
            const collector = () => {
              calls += 1;
              return new Promise((resolve) => { resolveCollection = resolve; });
            };

            const first = runCollection({}, 'first', collector, { timeoutMs: 1000 });
            const second = runCollection({}, 'second', () => assert.fail('second collector must not start'), { timeoutMs: 1000 });

            assert.strictEqual(second, first);
            assert.equal(calls, 0);
            await Promise.resolve();
            assert.equal(calls, 1);
            resolveCollection({ ok: true });
            assert.deepEqual(await first, { ok: true });
          });

          test('a timed-out flight is discarded so the next cron can collect', async () => {
            const stalled = runCollection({}, 'cron:first', () => new Promise(() => {}), { timeoutMs: 15 });
            await assert.rejects(stalled, (error) => {
              assert.ok(error instanceof CollectionTimeoutError);
              assert.equal(error.code, 'COLLECTION_TIMEOUT');
              assert.equal(error.source, 'cron:first');
              return true;
            });

            const recovered = await runCollection({}, 'cron:next', async () => ({ ok: true }), { timeoutMs: 1000 });
            assert.deepEqual(recovered, { ok: true });
          });

          test('late completion of an expired flight cannot clear a newer flight', async () => {
            let resolveExpired;
            const expiredOperation = new Promise((resolve) => { resolveExpired = resolve; });
            await assert.rejects(
              runCollection({}, 'cron:expired', () => expiredOperation, { timeoutMs: 15 }),
              CollectionTimeoutError,
            );

            let resolveCurrent;
            const current = runCollection({}, 'cron:current', () => new Promise((resolve) => {
              resolveCurrent = resolve;
            }), { timeoutMs: 1000 });
            await Promise.resolve();

            resolveExpired({ ok: 'late' });
            await new Promise((resolve) => setImmediate(resolve));

            const shared = runCollection({}, 'cron:shared', () => assert.fail('late completion must not clear the current flight'), { timeoutMs: 1000 });
            assert.strictEqual(shared, current);

            resolveCurrent({ ok: 'current' });
            assert.deepEqual(await current, { ok: 'current' });
          });
          '''.replace(/^          /gm, ''), encoding='utf-8')
          PY

      - name: Install test dependencies
        shell: bash
        run: |
          npm --prefix worker install --no-audit --no-fund
          npm --prefix site install --no-audit --no-fund

      - name: Run exhaustive repository checks
        shell: bash
        run: |
          set +e
          npm run check > /tmp/stationhead-check.log 2>&1
          status=$?
          echo "CHECK_STATUS=$status" >> "$GITHUB_ENV"
          tail -n 240 /tmp/stationhead-check.log
          exit 0

      - name: Probe production runtime
        shell: bash
        run: |
          set -uo pipefail
          probe() {
            local name="$1" url="$2" body="/tmp/${name}.json" code
            code=$(curl --silent --show-error --location --max-time 25 --output "$body" --write-out '%{http_code}' "$url" 2>"/tmp/${name}.err" || true)
            printf '### %s\n\n- HTTP: `%s`\n\n```json\n' "$name" "${code:-curl-failed}"
            if jq -e . "$body" >/dev/null 2>&1; then jq . "$body" | head -c 10000; else head -c 10000 "$body" 2>/dev/null || true; fi
            printf '\n```\n\n'
          }
          {
            echo '<!-- stationhead-runtime-recovery-check -->'
            echo '## Runtime recovery validation'
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Repository check exit code: \`${CHECK_STATUS}\`"
            echo
            probe pages-health 'https://skrzk.pages.dev/api/health'
            probe worker-health 'https://stationhead-monitor-collector.tarematsu.workers.dev/health'
            probe worker-lease 'https://stationhead-monitor-collector.tarematsu.workers.dev/coordination/lease'
            echo '### Repository check log tail'
            echo
            echo '```text'
            tail -n 180 /tmp/stationhead-check.log | head -c 30000
            echo
            echo '```'
          } > /tmp/runtime-comment.md

      - name: Commit validated fix
        if: env.CHECK_STATUS == '0'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add worker/src/index.js worker/src/optimized-index.js worker/src/email-recap-index.js worker/src/main.js worker/src/health-alert-index.js worker/wrangler.jsonc tests/worker-collection-flight.test.mjs
          git commit -m 'fix: recover stalled collector flight [runtime-fix-applied]'
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Post validation report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! -f /tmp/runtime-comment.md ]]; then
            printf '%s\n' '<!-- stationhead-runtime-recovery-check -->' '## Runtime recovery validation' '' 'The workflow stopped before producing a validation report.' > /tmp/runtime-comment.md
          fi
          existing=$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/69/comments" --jq '.[] | select(.body | contains("<!-- stationhead-runtime-recovery-check -->")) | .id' | tail -n 1)
          if [[ -n "$existing" ]]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing" --field body=@/tmp/runtime-comment.md
          else
            gh pr comment 69 --repo "$GITHUB_REPOSITORY" --body-file /tmp/runtime-comment.md
          fi

      - name: Fail when checks fail
        if: env.CHECK_STATUS != '0'
        run: exit 1
