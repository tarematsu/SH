name: Apply collector timeout context repair

on:
  push:
    branches:
      - agent/fix-collector-timeout-context
    paths:
      - scripts/patch-collector-timeout-context.mjs
      - .github/workflows/patch-collector-timeout-context.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-collector-timeout-context
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/patch-collector-timeout-context.mjs
      - run: git rm scripts/patch-collector-timeout-context.mjs .github/workflows/patch-collector-timeout-context.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix collector timeout request contexts"
          git push origin HEAD:agent/fix-collector-timeout-context
