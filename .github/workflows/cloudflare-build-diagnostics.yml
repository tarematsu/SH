name: Cloudflare build diagnostics

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: cloudflare-build-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[ci full]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_ACCOUNT_ID: 0500f25c2f74e7e76c94a8bcb6c7008b
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_WORKER_NAME: stationhead-monitor-collector
      TARGET_SHA: ${{ github.sha }}
      TARGET_BRANCH: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Watch exact Cloudflare build and collect logs
        id: monitor
        shell: bash
        run: |
          set +e
          node .github/scripts/cloudflare-build-diagnostics.mjs
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload sanitized Cloudflare diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-diagnostics-${{ github.sha }}
          path: .cloudflare-build-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Post or update failure report
        if: steps.monitor.outputs.exit_code != '0'
        shell: bash
        run: |
          marker="<!-- cloudflare-build-diagnostics:${CLOUDFLARE_WORKER_NAME}:${TARGET_SHA} -->"
          pr_number="$(gh api "repos/$GITHUB_REPOSITORY/commits/$TARGET_SHA/pulls" \
            -H 'Accept: application/vnd.github+json' \
            --jq 'map(select(.state == "open"))[0].number // empty')"

          if [ -n "$pr_number" ]; then
            comment_id="$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments?per_page=100" \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$comment_id" ]; then
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
                -f body="$(cat .cloudflare-build-diagnostics/comment.md)" >/dev/null
            else
              gh pr comment "$pr_number" --body-file .cloudflare-build-diagnostics/comment.md
            fi
          else
            title="Cloudflare build failed: ${CLOUDFLARE_WORKER_NAME} ${TARGET_SHA:0:12}"
            issue_number="$(gh issue list --state open --limit 100 --json number,title \
              --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --body-file .cloudflare-build-diagnostics/comment.md
            else
              gh issue create --title "$title" --body-file .cloudflare-build-diagnostics/comment.md
            fi
          fi

      - name: Fail the diagnostic check
        if: steps.monitor.outputs.exit_code != '0'
        shell: bash
        run: exit "${{ steps.monitor.outputs.exit_code }}"
