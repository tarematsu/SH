name: Cloudflare Git build diagnostics

on:
  push:
    branches: [main]
    paths:
      - 'worker/src/**'
      - 'worker/scripts/**'
      - 'worker/package.json'
      - 'worker/package-lock.json'
      - 'worker/wrangler.jsonc'
      - 'worker/wrangler.other.jsonc'
      - 'worker/wrangler.minute.jsonc'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-build-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select:
    name: Select Worker builds
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.targets.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select expected Cloudflare builds
        id: targets
        shell: bash
        run: |
          workers='[]'
          add_worker() {
            workers="$(jq -c --arg worker "$1" '. + [$worker]' <<<"$workers")"
          }

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            add_worker 'sh-monitor-buddies'
            add_worker 'sh-monitor-other'
            add_worker 'sh-minute-maintenance'
          else
            files="$(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}')"
            printf '%s\n' "$files"

            if grep -Eq '^worker/src/|^worker/scripts/|^worker/(package\.json|package-lock\.json)$' <<<"$files"; then
              add_worker 'sh-monitor-buddies'
              add_worker 'sh-monitor-other'
              add_worker 'sh-minute-maintenance'
            else
              grep -Eq '^worker/wrangler\.jsonc$' <<<"$files" && add_worker 'sh-monitor-buddies' || true
              grep -Eq '^worker/wrangler\.other\.jsonc$' <<<"$files" && add_worker 'sh-monitor-other' || true
              grep -Eq '^worker/wrangler\.minute\.jsonc$' <<<"$files" && add_worker 'sh-minute-maintenance' || true
            fi
          fi

          echo "workers=$workers" >> "$GITHUB_OUTPUT"

  diagnose:
    name: Diagnose ${{ matrix.worker }}
    needs: select
    if: needs.select.outputs.workers != '[]'
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.select.outputs.workers) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_ACCOUNT_ID: '0500f25c2f74e7e76c94a8bcb6c7008b'
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_WORKER_NAME: ${{ matrix.worker }}
      TARGET_SHA: ${{ github.sha }}
      TARGET_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Watch exact Cloudflare build and collect logs
        shell: bash
        run: node .github/scripts/cloudflare-build-diagnostics.mjs
      - name: Upload sanitized Cloudflare diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-diagnostics-${{ matrix.worker }}-${{ github.sha }}
          path: .cloudflare-build-diagnostics/
          if-no-files-found: warn
          retention-days: 14
