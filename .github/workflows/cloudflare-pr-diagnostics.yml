name: Cloudflare PR diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - "site/functions/**"
      - "packages/sh-shared/**"
      - "database/facts-migrations/**"
      - "database/facts-db.json"
      - ".github/workflows/cloudflare-pr-diagnostics.yml"
      - ".github/scripts/cloudflare-build-diagnostics.mjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-pr-diagnostics-sh-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  select-workers:
    name: Select affected Workers
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.targets.outputs.workers }}
      commands: ${{ steps.targets.outputs.commands }}
      diagnostics: ${{ steps.targets.outputs.diagnostics }}
      topology_rename: ${{ steps.targets.outputs.topology_rename }}
      facts_schema: ${{ steps.targets.outputs.facts_schema }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Select deploy targets from the import graph
        id: targets
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | tee changed-files.txt
          selection="$(node worker/scripts/select-worker-deploys.mjs < changed-files.txt)"
          echo "$selection" | jq .
          echo "workers=$(jq -c '.workers' <<<"$selection")" >> "$GITHUB_OUTPUT"
          echo "commands=$(jq -c '.commands' <<<"$selection")" >> "$GITHUB_OUTPUT"
          echo "diagnostics=$(jq -c '.diagnostics' <<<"$selection")" >> "$GITHUB_OUTPUT"
          topology_rename=false
          if git diff --diff-filter=M -U0 "$BASE_SHA" "$HEAD_SHA" -- 'worker/wrangler*.jsonc' \
              | grep -Eq '^[+-][[:space:]]*"name"[[:space:]]*:'; then
            topology_rename=true
            echo "::notice::Skipping direct PR deploy because a Worker script name changed."
          fi
          echo "topology_rename=$topology_rename" >> "$GITHUB_OUTPUT"
          facts_schema=false
          if grep -Eq '^(database/facts-migrations/|database/facts-db\.json$|worker/scripts/provision-facts-db\.mjs$)' changed-files.txt; then
            facts_schema=true
          fi
          echo "facts_schema=$facts_schema" >> "$GITHUB_OUTPUT"

  prepare-workers:
    name: Deploy affected Workers
    needs: select-workers
    if: needs.select-workers.outputs.workers != '[]' && needs.select-workers.outputs.topology_rename != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_ACCOUNT_ID: "0500f25c2f74e7e76c94a8bcb6c7008b"
      CLOUDFLARE_API_TOKEN: ${{ secrets['CLOUDFLARE_BUILDS_API_TOKEN'] || secrets['CLOUDFLARE_API_TOKEN'] || secrets['CF_API_TOKEN'] }}
      DEPLOY_COMMANDS: ${{ needs.select-workers.outputs.commands }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - name: Provision facts schema before dependent Workers
        if: needs.select-workers.outputs.facts_schema == 'true'
        working-directory: worker
        run: node scripts/provision-facts-db.mjs
      - name: Ensure split pipeline queues exist
        shell: bash
        working-directory: worker
        run: |
          for queue in \
            stationhead-raw-collection stationhead-raw-collection-dlq \
            stationhead-buddies-persist stationhead-buddies-persist-dlq \
            stationhead-ingest-finalize stationhead-ingest-finalize-dlq \
            stationhead-comments stationhead-comments-dlq \
            stationhead-read-model stationhead-read-model-dlq \
            stationhead-track-metadata stationhead-track-metadata-dlq \
            stationhead-buddies-facts stationhead-buddies-facts-dlq \
            stationhead-minute-derive stationhead-minute-derive-dlq \
            stationhead-minute-enrichment stationhead-minute-enrichment-dlq \
            stationhead-minute-rebuild stationhead-minute-rebuild-dlq \
            stationhead-buddy-playback stationhead-buddy-playback-dlq \
            stationhead-host-monitor stationhead-host-monitor-dlq \
            stationhead-pages-read-model-publication stationhead-pages-read-model-publication-dlq
          do
            npx wrangler queues create "$queue" >/dev/null 2>&1 || true
          done
      - name: Deploy selected Workers in dependency order
        shell: bash
        working-directory: worker
        run: |
          set -euo pipefail
          while IFS= read -r command; do
            echo "Deploying $command"
            npm run "$command"
          done < <(jq -r '.[]' <<<"$DEPLOY_COMMANDS")
      - name: Reinitialize track-history publication for one CPU probe
        working-directory: worker
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler d1 execute stationhead-minute --remote --config wrangler.pages-read-model.jsonc --command \
            "UPDATE sh_pages_payload_read_model SET payload_json=json_remove(json_set(payload_json,'$.published',json('false'),'$.published_at',NULL),'$.publication'),updated_at=CAST(unixepoch('subsec')*1000 AS INTEGER) WHERE model_key='track-history-stage';"
          npx wrangler d1 execute stationhead-minute --remote --config wrangler.pages-read-model.jsonc --command \
            "SELECT model_key,json_extract(payload_json,'$.published') AS published,json_type(payload_json,'$.publication') AS publication_type,updated_at FROM sh_pages_payload_read_model WHERE model_key='track-history-stage';"
      - name: Probe Pages Queue consumer and send one stale message
        working-directory: worker
        shell: bash
        run: |
          set -euo pipefail
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          base="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID"
          curl -fsS "${auth[@]}" "$base/queues" > pages-queues.json
          queue_id="$(jq -r '.result[] | select((.queue_name // .name)=="stationhead-pages-read-model-publication") | (.queue_id // .id)' pages-queues.json | head -1)"
          test -n "$queue_id" && test "$queue_id" != null
          curl -fsS "${auth[@]}" "$base/queues/$queue_id/consumers" > pages-consumers.json
          curl -fsS -X POST "${auth[@]}" -H 'Content-Type: application/json' \
            "$base/queues/$queue_id/messages" \
            --data '{"body":{"message_type":"stationhead-pages-track-history-publication","message_version":2,"action":"status","generation":"stale-probe"}}' \
            > pages-push.json
          jq -n \
            --arg queue_id "$queue_id" \
            --slurpfile queues pages-queues.json \
            --slurpfile consumers pages-consumers.json \
            --slurpfile push pages-push.json \
            '{queue_id:$queue_id,queues:$queues[0],consumers:$consumers[0],push:$push[0]}' \
            > pages-queue-probe.json
          jq '{queue_id,consumer_count:(.consumers.result|length),consumer_scripts:[.consumers.result[]?.script_name],push_success:.push.success}' pages-queue-probe.json
      - name: Upload Pages Queue probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-queue-probe-${{ github.event.pull_request.head.sha }}
          path: worker/pages-queue-probe.json
          if-no-files-found: warn
          retention-days: 2

  diagnose:
    name: Diagnose ${{ matrix.worker }}
    needs: [select-workers, prepare-workers]
    if: needs.prepare-workers.result == 'success' && needs.select-workers.outputs.diagnostics != '[]'
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.select-workers.outputs.diagnostics) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: "0500f25c2f74e7e76c94a8bcb6c7008b"
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets['CLOUDFLARE_BUILDS_API_TOKEN'] || secrets['CLOUDFLARE_API_TOKEN'] || secrets['CF_API_TOKEN'] }}
      CLOUDFLARE_WORKER_NAME: ${{ matrix.worker }}
      CLOUDFLARE_BUILD_TIMEOUT_MINUTES: "5"
      TARGET_SHA: ${{ github.event.pull_request.head.sha }}
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Watch Cloudflare build and collect logs
        shell: bash
        run: |
          set +e
          node .github/scripts/cloudflare-build-diagnostics.mjs
          status=$?
          set -e
          if [[ "$status" -eq 4 ]]; then
            echo "::notice::No matching finished Cloudflare build appeared; the direct PR deploy already succeeded."
            exit 0
          fi
          exit "$status"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pr-diagnostics-${{ matrix.worker }}-${{ github.event.pull_request.head.sha }}
          path: .cloudflare-build-diagnostics/
          if-no-files-found: warn
          retention-days: 14
