name: Cloudflare PR diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - "site/functions/**"
      - "packages/sh-shared/**"
      - "database/facts-migrations/**"
      - "database/facts-db.json"
      - ".github/workflows/cloudflare-pr-diagnostics.yml"
      - ".github/scripts/cloudflare-build-diagnostics.mjs"
      - ".github/scripts/analyze-worker-observability.py"
      - ".github/scripts/enforce-worker-cpu-budget.py"
      - ".github/scripts/fetch-r2-worker-logs.py"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-pr-diagnostics-sh-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  select-workers:
    name: Select affected Workers
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.targets.outputs.workers }}
      commands: ${{ steps.targets.outputs.commands }}
      diagnostics: ${{ steps.targets.outputs.diagnostics }}
      topology_rename: ${{ steps.targets.outputs.topology_rename }}
      facts_schema: ${{ steps.targets.outputs.facts_schema }}
      runtime_changes: ${{ steps.targets.outputs.runtime_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Select deploy targets from the import graph
        id: targets
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: node worker/scripts/select-worker-deploys.mjs --base-ref "origin/${BASE_REF}"

  deploy:
    name: Deploy affected Workers
    needs: select-workers
    if: needs.select-workers.outputs.commands != '[]' || needs.select-workers.outputs.facts_schema == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      DEPLOY_COMMANDS: ${{ needs.select-workers.outputs.commands }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - name: Apply current facts schema before dependent Workers
        if: needs.select-workers.outputs.facts_schema == 'true'
        run: npm run facts:migrate:remote
        working-directory: worker
      - name: Ensure split pipeline queues exist
        if: needs.select-workers.outputs.runtime_changes == 'true'
        run: npm run queues:ensure
        working-directory: worker
      - name: Deploy selected Workers in dependency order
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const { spawnSync } = require('node:child_process');
          const commands = JSON.parse(process.env.DEPLOY_COMMANDS || '[]');
          for (const script of commands) {
            const result = spawnSync('npm', ['run', script], {
              cwd: 'worker',
              stdio: 'inherit',
              shell: process.platform === 'win32',
            });
            if (result.status !== 0) process.exit(result.status || 1);
          }
          NODE

  diagnose:
    name: Diagnose ${{ matrix.worker }}
    needs: [select-workers, deploy]
    if: always() && needs.select-workers.outputs.diagnostics != '[]' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.select-workers.outputs.diagnostics) }}
    uses: ./.github/workflows/cloudflare-build-diagnostics-reusable.yml
    with:
      worker_name: ${{ matrix.worker }}
    secrets: inherit
