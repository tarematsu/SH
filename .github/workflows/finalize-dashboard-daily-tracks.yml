name: finalize dashboard daily tracks

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Restore dashboard stylesheet and add stacked range styles
        run: |
          git show 2f70e2999d8b4f5348dd0f39c41067602c825ddf:site/public/style.css > site/public/style.css
          cat >> site/public/style.css <<'CSS'

.online-range{display:flex;flex-direction:column;gap:2px;line-height:1.25}
.online-range[hidden]{display:none}
CSS
      - name: Validate
        run: |
          node --check site/public/dashboard-online-range.js
          node --check site/public/history/history-tracks.js
          node --check site/functions/api/track-history.js
          git diff --check
      - name: Commit final files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/finalize-dashboard-daily-tracks.yml
          git add site/public/style.css site/public/history/history.css site/public/history/history-tracks.js site/public/index.html site/public/dashboard-online-range.js
          git commit -m "Show daily playback totals and update dashboard metrics"
          git push
