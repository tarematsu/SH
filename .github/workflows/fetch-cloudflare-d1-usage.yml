name: Check Cloudflare D1 daily budget

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - "database/**"
      - "scripts/cloudflare-d1-usage.mjs"
      - ".github/workflows/fetch-cloudflare-d1-usage.yml"
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-d1-budget-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      D1_USAGE_OUTPUT_DIR: d1-usage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Query account-wide D1 row usage
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          node scripts/cloudflare-d1-usage.mjs
          cat d1-usage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce 80 percent free-tier budget
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const report = require('./d1-usage/summary.json');
          const actual = report.latestComplete;
          const target = report.limits.target;
          const violations = [];
          if (actual.rowsRead > target.rowsRead) {
            violations.push(`rows read ${actual.rowsRead} > ${target.rowsRead}`);
          }
          if (actual.rowsWritten > target.rowsWritten) {
            violations.push(`rows written ${actual.rowsWritten} > ${target.rowsWritten}`);
          }
          if (violations.length) {
            console.error(`D1 daily budget exceeded for ${actual.date}: ${violations.join(', ')}`);
            process.exit(1);
          }
          console.log(`D1 daily budget passed for ${actual.date}`);
          NODE

      - name: Install Wrangler for query insights
        working-directory: worker
        run: npm ci --no-audit --no-fund

      - name: Fetch top D1 queries by rows read and written
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p d1-usage/insights
          while IFS=$'\t' read -r account_id database_name; do
            [[ -n "$account_id" && -n "$database_name" ]] || continue
            safe_name="$(printf '%s' "$database_name" | tr -cs 'A-Za-z0-9._-' '_')"
            for metric in reads writes; do
              output="d1-usage/insights/${safe_name}-${metric}.json"
              error_output="d1-usage/insights/${safe_name}-${metric}.stderr.txt"
              if ! (cd worker && CLOUDFLARE_ACCOUNT_ID="$account_id" npx wrangler d1 insights "$database_name" \
                    --sort-type=sum --sort-by="$metric" --limit=30 --timePeriod=1d --json) \
                    > "$output" 2> "$error_output"; then
                jq -n --arg database "$database_name" --arg metric "$metric" \
                  --rawfile error "$error_output" \
                  '{database:$database,metric:$metric,available:false,error:$error}' > "$output"
              fi
            done
          done < <(jq -r '.[] | select(.accountId != null) | [.accountId,.name] | @tsv' d1-usage/databases.json)

      - name: Upload D1 budget and query insights
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-d1-usage-${{ github.run_id }}
          path: d1-usage/
          if-no-files-found: error
          retention-days: 14
