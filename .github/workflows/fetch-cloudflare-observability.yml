name: Cloudflare Observability

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: Minutes of Cloudflare metrics and persisted errors to inspect
        required: false
        default: "60"
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-observability-sh-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  observability:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKERS: sh-buddies-ingest,sh-minute-enrichment,sh-sakurazaka46jp,sh-runtime-orchestrator
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '60' }}
      CPU_BUDGET_MS: "10"
      CPU_BUDGET_EXEMPT_MARKERS: stationhead-minute-rebuild,stationhead-minute-derive,minute-rebuild-stage,minute_rebuild_,minute_fact_rebuild

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Query Cloudflare metrics and persisted errors
        shell: bash
        run: python3 .github/scripts/query-cloudflare-observability.py

      - name: Enforce per-invocation 10 ms CPU policy
        shell: bash
        run: python3 .github/scripts/audit-cloudflare-telemetry.py
