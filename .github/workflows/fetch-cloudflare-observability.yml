name: Check Cloudflare observability logs

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/src/**"
      - "worker/scripts/**"
      - "worker/wrangler*.jsonc"
      - "worker/package.json"
      - "worker/package-lock.json"
      - "site/functions/**"
      - "packages/sh-shared/**"
  workflow_dispatch:
    inputs:
      since:
        description: Optional ISO-8601 lower bound for R2 event timestamps
        required: false
        type: string
      lookback_minutes:
        description: Used when since is omitted
        required: false
        default: "90"
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: cloudflare-observability-sh-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: cloudflare-managed-1609110a
      LOG_SINCE: ${{ inputs.since || '' }}
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '90' }}
      R2_LOG_POLL_ATTEMPTS: "10"
      R2_LOG_POLL_SECONDS: "30"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for the current PR deployment and set the audit lower bound
        if: github.event_name == 'pull_request' && env.LOG_SINCE == ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          runtime_changed_at="$(git log --no-merges -1 --format=%cI "origin/${BASE_BRANCH}..HEAD" -- \
            worker/src worker/scripts 'worker/wrangler*.jsonc' \
            worker/package.json worker/package-lock.json site/functions packages/sh-shared)"
          if [[ -z "$runtime_changed_at" ]]; then
            audit_since="$(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ)"
            echo "No runtime changes in this PR; auditing the current deployment since $audit_since."
            echo "LOG_SINCE=$audit_since" >> "$GITHUB_ENV"
            exit 0
          fi
          runtime_changed_at="$(date -u -d "$runtime_changed_at" +%Y-%m-%dT%H:%M:%SZ)"
          deployed_at=""
          for attempt in $(seq 1 20); do
            runs="$(curl --fail-with-body --silent --show-error --get \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/cloudflare-pr-diagnostics.yml/runs" \
              --data-urlencode "branch=$HEAD_BRANCH" \
              --data-urlencode 'event=pull_request' \
              --data-urlencode 'status=completed' \
              --data-urlencode 'per_page=100')"
            deployed_at="$(jq -r --arg changed "$runtime_changed_at" --arg head "$HEAD_SHA" \
              '[.workflow_runs[] | select(.conclusion == "success" and .head_sha == $head and .created_at >= $changed)] | max_by(.updated_at) | .updated_at // empty' \
              <<<"$runs")"
            if [[ -n "$deployed_at" ]]; then break; fi
            echo "Waiting for Cloudflare deployment attempt $attempt/20"
            sleep 15
          done
          test -n "$deployed_at" || { echo 'No successful PR deployment found for this head SHA' >&2; exit 1; }
          audit_since="$(date -u -d "$deployed_at + 90 seconds" +%Y-%m-%dT%H:%M:%SZ)"
          echo "Runtime changed at $runtime_changed_at"
          echo "Deployment completed at $deployed_at; auditing after propagation grace at $audit_since"
          echo "LOG_SINCE=$audit_since" >> "$GITHUB_ENV"

      - name: Derive R2 credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match" || { echo "R2 bucket not accessible: $R2_BUCKET" >&2; exit 1; }
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Download incremental Worker logs with real events
        shell: bash
        run: python3 .github/scripts/fetch-r2-worker-logs.py

      - name: Audit current Workers and CPU time
        shell: bash
        run: python3 .github/scripts/analyze-worker-observability.py

      - name: Enforce per-invocation Worker CPU ceiling
        if: always()
        shell: bash
        run: python3 .github/scripts/enforce-worker-cpu-budget.py

      - name: Publish compact audit summary
        if: always()
        shell: bash
        run: |
          if [[ ! -f observability-logs/summary.json ]]; then
            exit 0
          fi
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          summary = json.loads(pathlib.Path('observability-logs/summary.json').read_text(encoding='utf-8'))
          print(f"## R2 Worker audit: {'OK' if summary['ok'] else 'FAILED'}")
          print()
          print(f"- Window start: `{summary['since']}`")
          print(f"- Newest event: `{summary['newest_event_timestamp']}`")
          print(f"- Worker events: `{summary['events']}`")
          print(f"- Error events: `{summary['error_events']}`")
          print(f"- Unexpected Workers: `{', '.join(summary['unexpected_scripts']) or 'none'}`")
          print(f"- Missing scheduled Workers: `{', '.join(summary['missing_required_scripts']) or 'none'}`")
          cpu = summary['cpu_ms']
          print(f"- CPU ms: avg `{cpu['avg']}`, p95 `{cpu['p95']}`, max `{cpu['max']}`")
          budget_path = pathlib.Path('observability-logs/cpu-budget.json')
          if budget_path.exists():
              budget = json.loads(budget_path.read_text(encoding='utf-8'))
              violations = ', '.join(item['worker'] for item in budget['violations']) or 'none'
              print(f"- Per-invocation CPU maximum: `<= {budget['budget_ms']} ms`; violations: `{violations}`")
          print()
          print('| Worker | events | errors | CPU avg ms | CPU p95 ms | CPU max ms | >=10 ms |')
          print('|---|---:|---:|---:|---:|---:|---:|')
          for name, item in summary['scripts'].items():
              metric = item['cpu_ms']
              print(f"| {name} | {item['events']} | {item['error_events']} | {metric['avg']} | {metric['p95']} | {metric['max']} | {metric['at_or_over_10ms']} |")
          PY

      - name: Upload filtered logs and compact analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-observability-sh-${{ github.run_id }}
          path: observability-logs/
          if-no-files-found: warn
          retention-days: 7
