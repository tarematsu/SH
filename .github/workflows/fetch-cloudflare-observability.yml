name: Check Cloudflare observability logs

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/fetch-cloudflare-observability.yml"
      - ".github/scripts/analyze-worker-observability.py"
  workflow_dispatch:
    inputs:
      since:
        description: Optional ISO-8601 lower bound for R2 object LastModified
        required: false
        type: string
      lookback_minutes:
        description: Used when since is omitted
        required: false
        default: "90"
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-observability-sh-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: cloudflare-managed-1609110a
      LOG_SINCE: ${{ inputs.since || '' }}
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '90' }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive R2 credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match" || { echo "R2 bucket not accessible: $R2_BUCKET" >&2; exit 1; }
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Download incremental Worker logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw observability-logs
          aws s3api list-objects-v2 --endpoint-url "$R2_ENDPOINT" --bucket "$R2_BUCKET" --output json > objects.json
          python3 - <<'PY'
          import datetime as dt, json, os, pathlib
          data = json.loads(pathlib.Path('objects.json').read_text(encoding='utf-8'))
          objects = data.get('Contents') or []
          if not objects:
              raise SystemExit('No observability objects found')
          since = os.environ.get('LOG_SINCE', '').strip()
          if since:
              cutoff = dt.datetime.fromisoformat(since.replace('Z', '+00:00'))
              if cutoff.tzinfo is None:
                  cutoff = cutoff.replace(tzinfo=dt.timezone.utc)
          else:
              cutoff = dt.datetime.now(dt.timezone.utc) - dt.timedelta(minutes=max(1, int(os.environ.get('LOOKBACK_MINUTES', '90'))))
          selected = []
          for item in objects:
              modified = dt.datetime.fromisoformat(str(item['LastModified']).replace('Z', '+00:00'))
              if modified >= cutoff:
                  selected.append((modified, item['Key']))
          selected.sort(reverse=True)
          selection = {
              'cutoff': cutoff.isoformat().replace('+00:00', 'Z'),
              'objects_available': len(objects),
              'objects_selected': len(selected),
              'newest_object_modified': selected[0][0].isoformat().replace('+00:00', 'Z') if selected else None,
              'oldest_object_modified': selected[-1][0].isoformat().replace('+00:00', 'Z') if selected else None,
          }
          pathlib.Path('selection.json').write_text(json.dumps(selection, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          pathlib.Path('keys.txt').write_text(''.join(f'{key}\n' for _, key in selected), encoding='utf-8')
          print(f"Selected {len(selected)} objects modified since {cutoff.isoformat()}")
          PY
          if [[ -s keys.txt ]]; then
            index=0
            while IFS= read -r key; do
              index=$((index + 1))
              file="raw/$(printf '%04d' "$index").log"
              aws s3api get-object --endpoint-url "$R2_ENDPOINT" --bucket "$R2_BUCKET" --key "$key" "$file" >/dev/null
            done < keys.txt
          fi
          selected_count="$(jq -r '.objects_selected' selection.json)"
          downloaded_count="$(find raw -type f | wc -l | tr -d ' ')"
          test "$downloaded_count" -eq "$selected_count" || {
            echo "Downloaded $downloaded_count of $selected_count selected R2 objects" >&2
            exit 1
          }

      - name: Audit current Workers and CPU time
        shell: bash
        run: python3 .github/scripts/analyze-worker-observability.py

      - name: Publish compact audit summary
        if: always()
        shell: bash
        run: |
          if [[ ! -f observability-logs/summary.json ]]; then
            exit 0
          fi
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          summary = json.loads(pathlib.Path('observability-logs/summary.json').read_text(encoding='utf-8'))
          print(f"## R2 Worker audit: {'OK' if summary['ok'] else 'FAILED'}")
          print()
          print(f"- Window start: `{summary['since']}`")
          print(f"- Worker events: `{summary['events']}`")
          print(f"- Error events: `{summary['error_events']}`")
          print(f"- Unexpected Workers: `{', '.join(summary['unexpected_scripts']) or 'none'}`")
          print(f"- Missing scheduled Workers: `{', '.join(summary['missing_required_scripts']) or 'none'}`")
          cpu = summary['cpu_ms']
          print(f"- CPU ms: avg `{cpu['avg']}`, p95 `{cpu['p95']}`, max `{cpu['max']}`")
          print()
          print('| Worker | events | errors | CPU avg ms | CPU p95 ms | CPU max ms | >10 ms |')
          print('|---|---:|---:|---:|---:|---:|---:|')
          for name, item in summary['scripts'].items():
              metric = item['cpu_ms']
              print(f"| {name} | {item['events']} | {item['error_events']} | {metric['avg']} | {metric['p95']} | {metric['max']} | {metric['over_10ms']} |")
          PY

      - name: Upload filtered logs and compact analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-observability-sh-${{ github.run_id }}
          path: observability-logs/
          if-no-files-found: warn
          retention-days: 7
