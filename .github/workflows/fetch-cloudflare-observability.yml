name: Check Cloudflare observability logs

on:
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/fetch-cloudflare-observability.yml"
  workflow_dispatch:
    inputs:
      since:
        description: Optional ISO-8601 lower bound for R2 object LastModified
        required: false
        type: string
      lookback_minutes:
        description: Used when since is omitted
        required: false
        default: "30"
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-observability-sh-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: cloudflare-managed-1609110a
      LOG_SINCE: ${{ inputs.since || '' }}
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '30' }}

    steps:
      - name: Derive R2 credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match" || { echo "R2 bucket not accessible: $R2_BUCKET" >&2; exit 1; }
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Download incremental Worker logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw observability-logs
          aws s3api list-objects-v2 --endpoint-url "$R2_ENDPOINT" --bucket "$R2_BUCKET" --output json > objects.json
          python3 - <<'PY'
          import datetime as dt, json, os, pathlib
          data = json.loads(pathlib.Path('objects.json').read_text(encoding='utf-8'))
          objects = data.get('Contents') or []
          if not objects:
              raise SystemExit('No observability objects found')
          since = os.environ.get('LOG_SINCE', '').strip()
          if since:
              cutoff = dt.datetime.fromisoformat(since.replace('Z', '+00:00'))
              if cutoff.tzinfo is None:
                  cutoff = cutoff.replace(tzinfo=dt.timezone.utc)
          else:
              cutoff = dt.datetime.now(dt.timezone.utc) - dt.timedelta(minutes=max(1, int(os.environ.get('LOOKBACK_MINUTES', '30'))))
          selected = []
          for item in objects:
              modified = dt.datetime.fromisoformat(str(item['LastModified']).replace('Z', '+00:00'))
              if modified >= cutoff:
                  selected.append((modified, item['Key']))
          selected.sort(reverse=True)
          selection = {
              'cutoff': cutoff.isoformat().replace('+00:00', 'Z'),
              'objects_available': len(objects),
              'objects_selected': len(selected),
              'newest_object_modified': selected[0][0].isoformat().replace('+00:00', 'Z') if selected else None,
              'oldest_object_modified': selected[-1][0].isoformat().replace('+00:00', 'Z') if selected else None,
          }
          pathlib.Path('selection.json').write_text(json.dumps(selection, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          pathlib.Path('cutoff.txt').write_text(selection['cutoff'], encoding='utf-8')
          pathlib.Path('keys.txt').write_text(''.join(f'{key}\n' for _, key in selected), encoding='utf-8')
          print(f"Selected {len(selected)} objects modified since {cutoff.isoformat()}")
          PY
          if [[ -s keys.txt ]]; then
            index=0
            while IFS= read -r key; do
              index=$((index + 1))
              file="raw/$(printf '%04d' "$index").log"
              aws s3api get-object --endpoint-url "$R2_ENDPOINT" --bucket "$R2_BUCKET" --key "$key" "$file" >/dev/null
            done < keys.txt
          fi
          selected_count="$(jq -r '.objects_selected' selection.json)"
          downloaded_count="$(find raw -type f | wc -l | tr -d ' ')"
          test "$downloaded_count" -eq "$selected_count" || {
            echo "Downloaded $downloaded_count of $selected_count selected R2 objects" >&2
            exit 1
          }

      - name: Build compact findings and CPU summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import gzip, json, math, pathlib, statistics
          targets = {
              'sh-buddies-monitor', 'sh-buddies-persist', 'sh-buddies-ingest', 'sh-buddies-comments',
              'sh-minute-read-model', 'sh-track-metadata',
              'sh-pages-read-model', 'sh-monitor-maintenance',
              'sh-minute-ingest', 'sh-minute-derive', 'sh-minute-enrichment',
              'sh-minute-rebuild', 'sh-minute-maintenance',
              'sh-monitor-other', 'sh-host-monitor', 'sh-buddy-playback',
          }
          output_dir = pathlib.Path('observability-logs')
          full_path = output_dir / 'sh-workers.ndjson'
          findings_path = output_dir / 'findings.ndjson'
          selection = json.loads(pathlib.Path('selection.json').read_text(encoding='utf-8'))

          def walk(value, prefix=''):
              if isinstance(value, dict):
                  for key, child in value.items():
                      name = f'{prefix}.{key}' if prefix else str(key)
                      yield name, child
                      yield from walk(child, name)
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      yield from walk(child, f'{prefix}[{index}]')

          def values(event, names):
              return [str(value) for path, value in walk(event)
                      if path.rsplit('.', 1)[-1].lower() in names and value not in (None, '', [], {})]

          def cpu_values(event):
              result = []
              for path, value in walk(event):
                  if 'cpu' not in path.rsplit('.', 1)[-1].lower() or isinstance(value, bool):
                      continue
                  try:
                      number = float(value)
                  except (TypeError, ValueError):
                      continue
                  if math.isfinite(number):
                      result.append(number)
              return result

          def percentile(items, fraction):
              if not items:
                  return None
              ordered = sorted(items)
              return ordered[min(len(ordered) - 1, math.ceil(len(ordered) * fraction) - 1)]

          counts = {name: 0 for name in sorted(targets)}
          cpu = {name: [] for name in sorted(targets)}
          findings = total = 0
          raw_paths = sorted(pathlib.Path('raw').glob('*'))
          with full_path.open('w', encoding='utf-8') as full, findings_path.open('w', encoding='utf-8') as flagged:
              for path in raw_paths:
                  data = path.read_bytes()
                  if data[:2] == b'\x1f\x8b':
                      data = gzip.decompress(data)
                  for line in data.decode('utf-8', errors='replace').splitlines():
                      try:
                          event = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      script = event.get('ScriptName')
                      if script not in targets:
                          continue
                      compact = json.dumps(event, ensure_ascii=False, separators=(',', ':'))
                      full.write(compact + '\n')
                      total += 1
                      counts[script] += 1
                      cpu[script].extend(cpu_values(event))
                      levels = [item.lower() for item in values(event, {'level', 'severity', 'loglevel'})]
                      outcomes = [item.lower() for item in values(event, {'outcome', 'status'})]
                      errors = values(event, {'error', 'exception', 'stack', 'stacktrace'})
                      if (any(item in {'warn', 'warning', 'error', 'fatal', 'critical'} for item in levels)
                              or any(item not in {'ok', 'success', 'succeeded', 'completed', 'true', '200'} for item in outcomes)
                              or errors):
                          flagged.write(compact + '\n')
                          findings += 1
          summary = {
              'ok': True,
              'since': selection['cutoff'],
              'objects_available': selection['objects_available'],
              'objects_selected': selection['objects_selected'],
              'objects_downloaded': len(raw_paths),
              'oldest_object_modified': selection['oldest_object_modified'],
              'newest_object_modified': selection['newest_object_modified'],
              'events': total,
              'findings': findings,
              'scripts': {},
          }
          for script in sorted(targets):
              samples = cpu[script]
              summary['scripts'][script] = {
                  'events': counts[script], 'cpu_samples': len(samples),
                  'cpu_avg': statistics.fmean(samples) if samples else None,
                  'cpu_p95': percentile(samples, 0.95), 'cpu_max': max(samples) if samples else None,
              }
          (output_dir / 'summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(summary, ensure_ascii=False,separators=(',', ':')))
          PY

      - name: Upload filtered logs and compact analysis
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-observability-sh-${{ github.run_id }}
          path: observability-logs/
          if-no-files-found: error
          retention-days: 7
