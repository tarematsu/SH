name: Diagnose worker tests

on:
  push:
    branches:
      - agent/fix-collector-timeout-context
    paths:
      - .github/workflows/diagnose-worker-tests.yml
      - worker/src/**
      - worker/tests/**

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-collector-timeout-context
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund
      - name: Run tests and capture tail
        id: tests
        continue-on-error: true
        working-directory: worker
        run: |
          set +e
          npm test > ../worker-test-output.txt 2>&1
          status=$?
          tail -n 200 ../worker-test-output.txt > ../worker-test-output-tail.txt
          mv ../worker-test-output-tail.txt ../worker-test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Commit diagnostic output
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker-test-output.txt
          git commit -m "Record worker test diagnostics" || exit 0
          git push origin HEAD:agent/fix-collector-timeout-context
      - name: Fail after recording
        if: steps.tests.outputs.status != '0'
        run: exit 1
