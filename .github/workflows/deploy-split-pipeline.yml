name: Deploy split Stationhead pipeline

on:
  push:
    branches: [main]
    paths:
      - 'worker/src/**'
      - 'worker/scripts/**'
      - 'worker/wrangler*.jsonc'
      - 'worker/package.json'
      - 'worker/package-lock.json'
      - '.github/workflows/deploy-split-pipeline.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-split-stationhead-pipeline
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy split pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - name: Ensure queues
        working-directory: worker
        shell: bash
        run: |
          for queue in \
            stationhead-raw-collection stationhead-raw-collection-dlq \
            stationhead-comments stationhead-comments-dlq \
            stationhead-read-model stationhead-read-model-dlq \
            stationhead-buddies-facts stationhead-buddies-facts-dlq \
            stationhead-minute-derive stationhead-minute-derive-dlq
          do
            npx wrangler queues create "$queue" >/dev/null 2>&1 || true
          done
      - name: Deploy minute pipeline
        run: npm run deploy:minute
        working-directory: worker
      - name: Deploy comments chain
        run: npm run deploy:comments
        working-directory: worker
      - name: Deploy channel ingest producer
        run: npm run deploy:ingest
        working-directory: worker
      - name: Switch raw collector producer last
        run: npm run deploy:buddies
        working-directory: worker
      - name: Deploy Pages read-model Worker
        run: npm run deploy:pages-read-model
        working-directory: worker
      - name: Deploy maintenance monitor
        run: npm run deploy:monitor-maintenance
        working-directory: worker
      - name: Reduce other monitor after replacements are live
        run: npm run deploy:other
        working-directory: worker
