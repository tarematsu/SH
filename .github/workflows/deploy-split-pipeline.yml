name: Deploy split buddies pipeline

on:
  push:
    branches: [main]
    paths:
      - 'worker/src/raw-collector-entry.js'
      - 'worker/src/ingest-channel-entry.js'
      - 'worker/src/comments-entry.js'
      - 'worker/src/read-model-entry.js'
      - 'worker/src/collector-config.js'
      - 'worker/wrangler.jsonc'
      - 'worker/wrangler.ingest.jsonc'
      - 'worker/wrangler.comments.jsonc'
      - 'worker/wrangler.read-model.jsonc'
      - 'worker/package.json'
      - 'worker/package-lock.json'
      - '.github/workflows/deploy-split-pipeline.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-split-buddies-pipeline
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy split pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - name: Ensure queues
        working-directory: worker
        shell: bash
        run: |
          for queue in \
            stationhead-raw-collection stationhead-raw-collection-dlq \
            stationhead-comments stationhead-comments-dlq \
            stationhead-read-model stationhead-read-model-dlq
          do
            npx wrangler queues create "$queue" >/dev/null 2>&1 || true
          done
      - name: Deploy ingest consumer
        run: npm run deploy:ingest
        working-directory: worker
      - name: Deploy comments consumer
        run: npm run deploy:comments
        working-directory: worker
      - name: Deploy read-model consumer
        run: npm run deploy:read-model
        working-directory: worker
      - name: Switch buddies producer last
        run: npm run deploy:buddies
        working-directory: worker
