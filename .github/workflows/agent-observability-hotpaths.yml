          write('tests/observability-hotpath-architecture.test.mjs', """import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          import test from 'node:test';

          const middleware = readFileSync(new URL('../site/functions/_middleware.js', import.meta.url), 'utf8');
          const dashboard = readFileSync(new URL('../site/functions/lib/dashboard-core.js', import.meta.url), 'utf8');
          const recovery = readFileSync(new URL('../worker/src/minute-revision-recovery.js', import.meta.url), 'utf8');
          const history = readFileSync(new URL('../site/functions/lib/track-history-restored-handler.js', import.meta.url), 'utf8');
          const migration = readFileSync(new URL('../database/facts-migrations/031_observability_hotpaths.sql', import.meta.url), 'utf8');
          const runtime = JSON.parse(readFileSync(new URL('../worker/wrangler.runtime.jsonc', import.meta.url), 'utf8'));

          test('materialized Pages APIs fail closed instead of executing legacy D1 handlers', () => {
            assert.match(middleware, /x-materialized-required/);
            assert.doesNotMatch(middleware, /prebuilt \|\| await context\.next\(\)/);
            assert.doesNotMatch(dashboard, /dashboardFromBuddiesDb/);
            assert.match(dashboard, /minute facts read model is stale/);
          });

          test('sparse recovery and queue starts use selective materialized access paths', () => {
            assert.match(recovery, /INDEXED BY idx_sh_queue_revisions_sparse_recovery/);
            assert.match(history, /FROM sh_track_history_queue_starts/);
            assert.doesNotMatch(history, /SELECT DISTINCT station_id,start_time\s+FROM sh_queue_items/);
            assert.equal(runtime.vars.DERIVE_REVISION_RECOVERY_SCAN_INTERVAL_MS, 3_600_000);
            assert.equal(runtime.vars.LIVE_DERIVE_DIRECT_QUEUE_ENABLED, true);
          });

          test('queue-start migration seeds and incrementally advances the latest complete revision', () => {
            const db = new DatabaseSync(':memory:');
            db.exec(`CREATE TABLE sh_queue_revisions(
              id INTEGER PRIMARY KEY,
              channel_id INTEGER NOT NULL,
              station_id INTEGER,
              queue_start_time INTEGER,
              effective_at INTEGER NOT NULL,
              status TEXT NOT NULL,
              source_job_id INTEGER,
              coverage_complete INTEGER,
              source_visible_count INTEGER,
              materialized_item_count INTEGER,
              last_materialized_at INTEGER
            );`);
            db.exec(migration);
            const start = Date.parse('2026-07-20T00:00:00Z');
            db.prepare(`INSERT INTO sh_queue_revisions(
              id,channel_id,station_id,queue_start_time,effective_at,status
            ) VALUES(1,10,20,?,?, 'complete')`).run(start, start);
            assert.equal(db.prepare('SELECT latest_revision_id FROM sh_track_history_queue_starts').get().latest_revision_id, 1);
            db.prepare(`INSERT INTO sh_queue_revisions(
              id,channel_id,station_id,queue_start_time,effective_at,status
            ) VALUES(2,10,20,?,?, 'complete')`).run(start, start + 1);
            assert.equal(db.prepare('SELECT latest_revision_id FROM sh_track_history_queue_starts').get().latest_revision_id, 2);
          });
          """)

          write('worker/tests/minute-direct-live-derive.test.js', """import assert from 'node:assert/strict';
          import test from 'node:test';

          import { consumeMinuteQueue } from '../src/minute-production-entry.js';
          import { processMinuteDeriveMessage } from '../src/minute-derive-router.js';
          import {
            minuteDirectLiveDeriveMessage,
            parseDirectLiveMinuteDeriveMessage,
          } from '../src/minute-derive-trigger.js';

          const payload = {
            payload_version: 1,
            observedAt: 180_001,
            snapshot: { channel_id: 10, listener_count: 20 },
            queue: null,
            comments: {},
            rebuild: null,
          };

          test('direct live message is self-validating and retains the durable Queue payload', () => {
            const message = minuteDirectLiveDeriveMessage(payload);
            assert.equal(message.job_id, 'minute-fact:10:180000');
            assert.equal(parseDirectLiveMinuteDeriveMessage(message).payload, payload);
          });

          test('production live ingest bypasses the D1 job ledger when direct Queue mode is enabled', async () => {
            let handlers;
            let inboxCalls = 0;
            const direct = [];
            await consumeMinuteQueue({ messages: [] }, {
              LIVE_DERIVE_DIRECT_QUEUE_ENABLED: true,
              LIVE_REVISION_MATERIALIZATION_ENABLED: false,
            }, null, {
              consumeMinuteFactBatch: async (_batch, _env, value) => {
                handlers = value;
                return { received: 0 };
              },
              enqueueMinuteFactJob: async () => {
                inboxCalls += 1;
                throw new Error('D1 inbox must not be used');
              },
              enqueueDirectLiveMinuteDerive: async (_env, value) => {
                direct.push(value);
                return { enqueued: true, direct: true };
              },
            });
            const result = await handlers.enqueue({}, payload, { jobKind: 'live' });
            assert.deepEqual(result, { enqueued: true, direct: true });
            assert.equal(inboxCalls, 0);
            assert.deepEqual(direct, [payload]);
          });

          test('direct live derive writes once without claim or completion lifecycle writes', async () => {
            const writes = [];
            const result = await processMinuteDeriveMessage(
              { LIVE_REVISION_MATERIALIZATION_ENABLED: false },
              minuteDirectLiveDeriveMessage(payload),
              { write: async (_env, value) => writes.push(value) },
            );
            assert.equal(result.processed, 1);
            assert.equal(result.direct, true);
            assert.deepEqual(writes, [payload]);
          });
          """)
          PY
