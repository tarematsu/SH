name: Debug Pages tests

on:
  pull_request:
    branches: [main]

jobs:
  pages-test-log:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Capture integration test output
        id: tests
        working-directory: site
        shell: bash
        run: |
          set +e
          npm run test:integration > pages-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: pages-test-log
          path: site/pages-test.log
      - name: Preserve test result
        if: steps.tests.outputs.status != '0'
        run: exit 1
