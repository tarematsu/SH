name: CI

on:
  pull_request:
    paths:
      - 'site/**'
      - 'database/**'
      - 'worker/**'
      - 'packages/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Select checks
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.scope.outputs.pages }}
      worker: ${{ steps.scope.outputs.worker }}
      sql: ${{ steps.scope.outputs.sql }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select affected checks
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          pages=false
          worker=false
          sql=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            pages=true
            worker=true
            sql=true
          else
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
            while IFS= read -r file; do
              case "$file" in
                site/*|packages/sh-shared/*|database/*)
                  pages=true
                  ;;
              esac
              case "$file" in
                worker/*|packages/sh-shared/*|database/facts-*|database/facts-migrations/*)
                  worker=true
                  ;;
              esac
              case "$file" in
                database/*|tests/sql_migrations_test.py)
                  sql=true
                  ;;
              esac
              case "$file" in
                .github/workflows/ci.yml|.github/actions/*)
                  pages=true
                  worker=true
                  sql=true
                  ;;
              esac
            done < changed-files.txt
          fi

          echo "pages=$pages" >> "$GITHUB_OUTPUT"
          echo "worker=$worker" >> "$GITHUB_OUTPUT"
          echo "sql=$sql" >> "$GITHUB_OUTPUT"

  repository:
    name: Full repository checks
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Restore root-test Worker dependencies
        id: repository-worker-modules
        uses: actions/cache@v4
        with:
          path: worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('worker/package-lock.json', 'packages/sh-shared/**') }}
      - name: Install root-test Worker dependencies
        if: steps.repository-worker-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: worker
      - uses: actions/setup-python@v5
        if: needs.changes.outputs.sql == 'true'
        with:
          python-version: '3.12'
      - run: node scripts/check-js-syntax.mjs scripts tests
      - name: Run JavaScript tests
        shell: bash
        run: |
          set +e
          npm run test:js > github-js-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 github-js-tests.log
          fi
          exit "$status"
      - name: Upload JavaScript test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-test-failure
          path: github-js-tests.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Run SQL migration tests
        if: needs.changes.outputs.sql == 'true'
        run: npm run test:sql

  pages:
    name: Pages checks
    needs: changes
    if: needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            worker/package-lock.json
      - name: Restore Pages test dependencies
        id: pages-modules
        uses: actions/cache@v4
        with:
          path: |
            site/node_modules
            worker/node_modules
          key: ${{ runner.os }}-node22-pages-${{ hashFiles('site/package-lock.json', 'worker/package-lock.json', 'packages/sh-shared/**') }}
      - name: Install Pages dependencies
        if: steps.pages-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: site
      - name: Install Worker integration dependencies
        if: steps.pages-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: worker
      - run: npm run check
        working-directory: site
      - name: Run Pages integration tests
        shell: bash
        working-directory: site
        run: |
          set +e
          node --test tests/*.test.js > pages-integration-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 pages-integration-tests.log
          fi
          exit "$status"
      - name: Upload Pages integration failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-integration-test-failure
          path: site/pages-integration-tests.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Run local D1 tests
        run: npm run test:d1
        working-directory: site
      - name: Verify production migration command is skipped in CI
        run: npm run db:migrate
        working-directory: site

  worker:
    name: Worker checks
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Restore Worker dependencies
        id: worker-modules
        uses: actions/cache@v4
        with:
          path: worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('worker/package-lock.json', 'packages/sh-shared/**') }}
      - name: Install Worker dependencies
        if: steps.worker-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Check active Worker bundles
        shell: bash
        run: |
          set +e
          npm run check > worker-bundle-check.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 240 worker-bundle-check.log
          fi
          exit "$status"
      - name: Upload Worker bundle failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle-failure
          path: worker/worker-bundle-check.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Run Worker tests
        shell: bash
        run: |
          set +e
          npm test > worker-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 240 worker-tests.log
          fi
          exit "$status"
      - name: Upload Worker test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-test-failure
          path: worker/worker-tests.log
          if-no-files-found: ignore
          retention-days: 7

  production-stop-diagnostic:
    name: Production stop diagnostic
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 572
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets['CLOUDFLARE_BUILDS_API_TOKEN'] || secrets['CLOUDFLARE_API_TOKEN'] || secrets['CF_API_TOKEN'] }}
    steps:
      - name: Read public health timestamps and five-minute Worker activity
        shell: bash
        run: |
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import re
          import urllib.request

          token = os.environ['CLOUDFLARE_API_TOKEN'].strip()
          headers = {
              'Accept': 'application/json',
              'User-Agent': 'github-actions-production-stop-diagnostic',
          }

          def request(url, payload=None, authenticated=False):
              request_headers = dict(headers)
              if authenticated:
                  request_headers['Authorization'] = f'Bearer {token}'
                  request_headers['Content-Type'] = 'application/json'
              req = urllib.request.Request(
                  url,
                  data=None if payload is None else json.dumps(payload, separators=(',', ':')).encode(),
                  headers=request_headers,
                  method='GET' if payload is None else 'POST',
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.load(response)

          interesting = re.compile(r'(?:^|_)(?:at|time|timestamp|age|status|state|ok|error|count|minute|source|task|fresh|stale)(?:$|_)', re.I)

          def timestamps(value, prefix=''):
              output = {}
              if isinstance(value, dict):
                  for key, child in value.items():
                      path = f'{prefix}.{key}' if prefix else str(key)
                      if isinstance(child, (dict, list)):
                          output.update(timestamps(child, path))
                      elif interesting.search(str(key)):
                          output[path] = child
              elif isinstance(value, list):
                  for index, child in enumerate(value[:10]):
                      output.update(timestamps(child, f'{prefix}[{index}]'))
              return output

          print('PUBLIC_HEALTH')
          for path in ('health', 'health/minute', 'health/other', 'health/sakurazaka46jp', 'dashboard'):
              data = request(f'https://skrzk.pages.dev/api/{path}')
              print(path, json.dumps(timestamps(data), ensure_ascii=False, sort_keys=True)[:12000])

          accounts = request(
              'https://api.cloudflare.com/client/v4/accounts?per_page=50',
              authenticated=True,
          ).get('result') or []
          if len(accounts) != 1:
              raise RuntimeError(f'Expected one visible account, got {len(accounts)}')
          account = str(accounts[0]['id'])
          end = dt.datetime.now(dt.timezone.utc).replace(microsecond=0)
          start = end - dt.timedelta(hours=3)
          query = '''
          query WorkerActivity($accountTag: string, $start: string, $end: string) {
            viewer {
              accounts(filter: {accountTag: $accountTag}) {
                workersInvocationsAdaptiveGroups(
                  limit: 1000
                  orderBy: [datetimeFiveMinutes_ASC]
                  filter: {datetime_geq: $start, datetime_leq: $end}
                ) {
                  dimensions { datetimeFiveMinutes scriptName }
                  sum { requests errors }
                }
              }
            }
          }
          '''
          payload = {
              'query': query,
              'variables': {
                  'accountTag': account,
                  'start': start.isoformat().replace('+00:00', 'Z'),
                  'end': end.isoformat().replace('+00:00', 'Z'),
              },
          }
          result = request('https://api.cloudflare.com/client/v4/graphql', payload, authenticated=True)
          if result.get('errors'):
              raise RuntimeError(json.dumps(result['errors'], ensure_ascii=False)[:2000])
          rows = (((result.get('data') or {}).get('viewer') or {}).get('accounts') or [{}])[0].get('workersInvocationsAdaptiveGroups') or []
          workers = {'sh-runtime-orchestrator', 'sh-sakurazaka46jp'}
          print('WORKER_ACTIVITY_5M')
          for row in rows:
              dimensions = row.get('dimensions') or {}
              if dimensions.get('scriptName') not in workers:
                  continue
              sums = row.get('sum') or {}
              print(json.dumps({
                  'time': dimensions.get('datetimeFiveMinutes'),
                  'worker': dimensions.get('scriptName'),
                  'requests': int(sums.get('requests') or 0),
                  'errors': int(sums.get('errors') or 0),
              }, separators=(',', ':')))
          PY

  audit:
    name: Dependency audit
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            worker/package-lock.json
      - run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: site
      - run: npm audit --audit-level=high
        working-directory: site
      - run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: worker
      - run: npm audit --audit-level=high
        working-directory: worker
