name: CI

on:
  pull_request:
    paths:
      - 'site/**'
      - 'database/**'
      - 'worker/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Full repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - run: npm ci --no-audit --no-fund
        working-directory: site
      - run: npm run check:js
      - name: Run JavaScript tests
        shell: bash
        run: |
          set +e
          npm run test:js > github-js-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 github-js-tests.log
          fi
          exit "$status"
      - name: Upload JavaScript test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-test-failure
          path: github-js-tests.log
          if-no-files-found: ignore
          retention-days: 7
      - run: npm run test:sql

  pages:
    name: Pages checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            worker/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: site
      - run: npm run check
        working-directory: site
      - name: Run Pages integration tests
        shell: bash
        working-directory: site
        run: |
          set +e
          npm run test:integration > pages-integration-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 pages-integration-tests.log
          fi
          exit "$status"
      - name: Upload Pages integration failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-integration-test-failure
          path: site/pages-integration-tests.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Run local D1 tests
        run: npm run test:d1
        working-directory: site
      - name: Verify production migration command is skipped in CI
        run: npm run db:migrate
        working-directory: site

  worker:
    name: Worker checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - name: Check minute Worker bundle
        run: npm run check:minute-bundle
      - name: Diagnose failed Cloudflare minute build
        if: github.event.pull_request.number == 363
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        env:
          CLOUDFLARE_ACCOUNT_ID: '0500f25c2f74e7e76c94a8bcb6c7008b'
          CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_WORKER_NAME: sh-monitor-minute
          TARGET_SHA: 4c893b218dbff4feb77a729b8cda51cf4b6a8875
          TARGET_BRANCH: agent/reduce-buddies-cron-cpu
          CLOUDFLARE_BUILD_TIMEOUT_MINUTES: 5
        run: node .github/scripts/cloudflare-build-diagnostics.mjs
      - name: Upload minute build diagnostics
        if: github.event.pull_request.number == 363 && always()
        uses: actions/upload-artifact@v4
        with:
          name: minute-build-diagnostics
          path: .cloudflare-build-diagnostics/
          if-no-files-found: warn
          retention-days: 2
      - run: npm test

  audit:
    name: Dependency audit
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --no-audit --no-fund
        working-directory: site
      - run: npm audit --audit-level=high
        working-directory: site
      - run: npm ci --no-audit --no-fund
        working-directory: worker
      - run: npm audit --audit-level=high
        working-directory: worker
