name: Exhaustive check

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exhaustive-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exhaustive-check:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[ci full]'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Worker tooling
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Install Pages tooling
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Run JavaScript, SQL, Worker and Pages integration checks
        run: npm run check

      - name: Audit Worker dependencies
        working-directory: worker
        run: npm audit --audit-level=high

      - name: Audit Pages dependencies
        working-directory: site
        run: npm audit --audit-level=high
