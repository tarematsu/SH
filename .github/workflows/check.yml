name: check

on:
  push:
    branches:
      - main
      - refactor/cloud-primary-local-failover
  pull_request:

permissions:
  contents: read

jobs:
  syntax-and-bundle:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[codex-local-release]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Repository inventory
        run: |
          echo '--- tracked files ---'
          git ls-files
          echo '--- largest tracked files ---'
          git ls-files -z | xargs -0 du -h | sort -h | tail -80
      - name: Install Worker tooling
        working-directory: worker
        run: npm install --no-audit --no-fund
      - name: Run repository checks
        run: npm run check
