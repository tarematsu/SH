name: check

on:
  push:
    branches:
      - main
      - refactor/cloud-primary-local-failover
  pull_request:

permissions:
  contents: read

jobs:
  syntax-and-bundle:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[codex-local-release]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            collector
            scraper
            worker
            site
            tools
            scripts
            tests
            database/migrations
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Worker tooling
        working-directory: worker
        run: npm install --no-audit --no-fund
      - name: Check JavaScript syntax
        run: npm run check:js
      - name: Run JavaScript tests
        run: npm run test:js
      - name: Run SQL migration tests
        run: npm run test:sql
      - name: Check Worker bundle
        run: npm run check:worker-bundle
