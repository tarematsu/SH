name: apply-audit

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply patch
        run: |
          base64 -d .audit-upload/runtime-audit-v3.patch.gz.b64 | gzip -dc > /tmp/runtime.patch
          git apply --check /tmp/runtime.patch
          git apply /tmp/runtime.patch
          git rm .audit-upload/runtime-audit-v3.patch.gz.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "perf: apply runtime audit changes"
          git push origin HEAD:${{ github.head_ref }}
