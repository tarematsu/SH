name: finalize-audit

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply final compatibility patch
        run: |
          base64 -d .audit-upload/finalize-v3.patch.gz.b64 | gzip -dc > /tmp/finalize.patch
          git apply --check /tmp/finalize.patch
          git apply /tmp/finalize.patch
          git rm .audit-upload/finalize-v3.patch.gz.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: preserve runtime compatibility"
          git push origin HEAD:${{ github.head_ref }}
