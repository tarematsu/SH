name: check

on:
  pull_request:

permissions:
  contents: read

jobs:
  syntax-and-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build temporary audit archive
        run: git archive --format=zip --output=repository-audit.zip HEAD
      - name: Upload temporary audit archive
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-v3
          path: repository-audit.zip
          retention-days: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Worker tooling
        working-directory: worker
        run: npm install --no-audit --no-fund
      - name: Run repository checks
        run: npm run check
