name: check

on:
  push:
    branches:
      - main
      - refactor/cloud-primary-local-failover
  pull_request:

permissions:
  contents: read

jobs:
  syntax-and-bundle:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[codex-local-release]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            collector
            scraper
            worker
            site
            tools
            scripts
            tests
            database/migrations
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Worker tooling
        working-directory: worker
        run: npm install --no-audit --no-fund
      - name: Check JavaScript syntax
        run: npm run check:js
      - name: Run JavaScript tests
        id: js-tests
        continue-on-error: true
        run: npm run test:js > js-test.log 2>&1
      - name: Upload JavaScript test log
        uses: actions/upload-artifact@v4
        with:
          name: js-test-log
          path: js-test.log
          retention-days: 1
      - name: Fail on JavaScript test failure
        if: steps.js-tests.outcome == 'failure'
        run: exit 1
      - name: Run SQL migration tests
        run: npm run test:sql
      - name: Check Worker bundle
        run: npm run check:worker-bundle
