name: Apply PR 332 audit fixes

on:
  push:
    branches:
      - agent/separate-total-listens-from-stream-counts
    paths:
      - scripts/patch-pr332.mjs
      - .github/workflows/patch-pr332.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/separate-total-listens-from-stream-counts
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply audited fixes
        run: node scripts/patch-pr332.mjs
      - name: Remove temporary patch machinery
        run: git rm scripts/patch-pr332.mjs .github/workflows/patch-pr332.yml
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix stream baseline cutover and CSV regression"
          git push origin HEAD:agent/separate-total-listens-from-stream-counts
