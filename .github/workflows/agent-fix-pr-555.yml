name: Apply PR 555 worker fixes

on:
  push:
    branches:
      - agent/enforce-invocation-cpu-budget
    paths:
      - '.github/scripts/agent-fix-pr-555.mjs'
      - '.github/workflows/agent-fix-pr-555.yml'

permissions:
  contents: write

concurrency:
  group: agent-fix-pr-555
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enforce-invocation-cpu-budget
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Apply focused fixes
        run: node .github/scripts/agent-fix-pr-555.mjs
      - name: Install Worker dependencies
        run: npm ci --no-audit --no-fund
        working-directory: worker
      - name: Check Worker bundles
        run: npm run check
        working-directory: worker
      - name: Run Worker tests
        run: npm test
        working-directory: worker
      - name: Commit verified fixes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/scripts/agent-fix-pr-555.mjs .github/workflows/agent-fix-pr-555.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Fix PR worker checks'
          git push origin HEAD:agent/enforce-invocation-cpu-budget
