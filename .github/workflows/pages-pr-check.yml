name: Pages PR check

on:
  pull_request:
    paths:
      - 'site/**'
      - 'database/**'
      - '.github/workflows/pages-pr-check.yml'

permissions:
  contents: read

concurrency:
  group: pages-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pages-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check syntax
        run: npm run check

      - name: Run Pages tests
        run: npm test
