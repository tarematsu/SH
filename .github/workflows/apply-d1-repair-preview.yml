name: Apply branch-scoped D1 repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: stationhead-d1-migrations
  cancel-in-progress: false

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'apply-production-d1-repair'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: site
    env:
      D1_MIGRATION_FORCE: 'true'
      D1_MIGRATION_TARGET: remote
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Apply pending production migrations
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_BUILDS_API_TOKEN:-}"
          fi
          npm run db:migrate
      - name: Verify production schema
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_BUILDS_API_TOKEN:-}"
          fi
          npm run db:verify
      - name: Verify first backfill batch
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_BUILDS_API_TOKEN:-}"
          fi
          npx wrangler d1 execute stationhead-monitor --remote --json --command="SELECT
            (SELECT COUNT(*) FROM sh_legacy_snapshots) AS legacy_rows,
            (SELECT COUNT(*) FROM sh_legacy_samples) AS normalized_rows,
            (SELECT MIN(legacy_id) FROM sh_legacy_samples) AS normalized_min_id,
            (SELECT MAX(legacy_id) FROM sh_legacy_samples) AS normalized_max_id,
            (SELECT legacy_backfill_id FROM sh_data_maintenance_state WHERE id='rollup-retention-v1') AS backfill_cursor;" > production-d1-repair.json
          cat production-d1-repair.json
          python - <<'PY'
          import json
          data=json.load(open('production-d1-repair.json',encoding='utf-8'))
          rows=[]
          for entry in data if isinstance(data,list) else [data]:
              rows.extend(entry.get('results') or entry.get('result',[{}])[0].get('results',[]))
          row=rows[0] if rows else {}
          if int(row.get('normalized_rows') or 0) < 1 or int(row.get('backfill_cursor') or 0) < 1:
              raise SystemExit(f'legacy backfill did not start: {row}')
          print(json.dumps(row,ensure_ascii=False))
          PY
      - name: Upload repair result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-d1-repair
          path: site/production-d1-repair.json
          if-no-files-found: ignore
