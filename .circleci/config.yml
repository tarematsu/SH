version: 2.1

jobs:
  check:
    docker:
      - image: cimg/node:22.23.0
    resource_class: small
    steps:
      - checkout
      - run:
          name: Select validation mode
          command: |
            commit_message="$(git log -1 --pretty=%B)"
            if printf '%s' "$commit_message" | grep -q '\[ci quick\]'; then
              echo 'export CHECK_MODE=quick' >> "$BASH_ENV"
            else
              echo 'export CHECK_MODE=full' >> "$BASH_ENV"
            fi
      - run:
          name: Install full-check dependencies
          command: |
            if [ "$CHECK_MODE" = "full" ]; then
              sudo apt-get update
              sudo apt-get install -y python3
              sudo ln -sf /usr/bin/python3 /usr/local/bin/python
              npm --prefix worker install --no-audit --no-fund
            fi
      - run:
          name: Run repository checks
          command: |
            if [ "$CHECK_MODE" = "quick" ]; then
              npm run check:js
              npm run test:js
            else
              npm run check
            fi

workflows:
  repository-checks:
    jobs:
      - check
