<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8fb">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Buddies いいねランキング</title>
  <link rel="stylesheet" href="/history/history-lite.css">
</head>
<body>
  <a class="skip-link" href="#likesContent">本文へ移動</a>
  <main id="likesContent" class="shell">
    <header class="top-card history-header">
      <div><p class="kicker">BUDDIES DATA ARCHIVE</p><h1>いいねランキング</h1></div>
      <a class="button" href="/">現在へ</a>
    </header>

    <nav class="mode-tabs" aria-label="表示種類">
      <a href="/history/#current">現在</a>
      <a href="/history/#daily">日次</a>
      <a href="/history/#weekly">週次</a>
      <a href="/history/#ranking">リーダーボード</a>
      <a href="/history/#monthly">月次</a>
      <a href="/history/#tracks">再生曲</a>
      <a class="active" aria-current="page" href="/history/likes/">いいね</a>
      <a href="/history/#broadcasts">公式ストリーム</a>
    </nav>

    <section class="guide"><div><p class="kicker">LIKE / BITE</p><h2>最新いいね数</h2></div></section>

    <div class="like-actions">
      <button id="load" class="button primary" type="button">更新</button>
      <button id="csv" class="button" type="button">CSV</button>
    </div>

    <p id="notice" class="notice" role="status">読み込み中…</p>

    <section class="summary-cards likes-summary" aria-label="いいね集計概要">
      <article><span>対象曲数</span><strong id="trackCount">-</strong></article>
      <article><span>最高いいね</span><strong id="maxLikes">-</strong></article>
      <article><span>今週の再生数</span><strong id="weekPlays">-</strong></article>
      <article><span>最終更新</span><strong id="latestAt" class="summary-date">-</strong></article>
    </section>

    <section class="card data-panel">
      <div class="section-head"><div><p class="kicker">TOP TRACKS</p><h2>最新いいねランキング</h2></div></div>
      <ol id="rankingList" class="like-ranking"></ol>
    </section>

    <section class="card data-panel">
      <div class="section-head"><div><p class="kicker">DATA</p><h2>曲別一覧</h2></div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>順位</th><th>曲名</th><th>アーティスト</th><th>最新いいね</th><th>今週再生</th><th>最終観測</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/history/history-likes.js" defer></script>
</body>
</html>
