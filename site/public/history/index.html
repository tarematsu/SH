<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Buddies データ履歴</title>
  <link rel="stylesheet" href="/history/history.css">
  <link rel="stylesheet" href="/design-system.css">
  <style>
    .hero .back{align-self:center;white-space:nowrap}
    @media(max-width:760px){.hero{align-items:center}}
  </style>
</head>
<body>
<main class="wrap">
  <header class="hero">
    <div>
      <p class="eyebrow">BUDDIES DATA ARCHIVE</p>
      <h1>データ履歴</h1>
    </div>
    <a class="back" href="/">現在の状況へ</a>
  </header>

  <nav class="mode-tabs" aria-label="表示種類">
    <button data-mode="daily">日次</button>
    <button data-mode="weekly" class="active">週次</button>
    <button data-mode="monthly">月次</button>
    <button data-mode="broadcasts">公式ステヘ</button>
    <button data-mode="raw">詳細</button>
    <button data-mode="ranking">週間リーダーボード</button>
  </nav>

  <section class="guide" id="guide">
    <strong>週次集計</strong>
    <span>週ごとの最大同接、再生数増加、メンバー増加を表示します。</span>
  </section>

  <section class="controls">
    <div class="range-presets" aria-label="期間プリセット">
      <button data-days="30">30日</button>
      <button data-days="90">3か月</button>
      <button data-days="365">1年</button>
      <button data-days="all" class="active">全期間</button>
    </div>
    <label>開始<input id="from" type="date" value="2024-05-01"></label>
    <label>終了<input id="to" type="date"></label>
    <label id="rankingScopeWrap" hidden>表示対象
      <select id="rankingScope">
        <option value="featured">櫻坂</option>
        <option value="all">全ホスト</option>
      </select>
    </label>
    <label id="hostWrap" hidden>ホスト検索
      <input id="host" type="search" placeholder="ホスト名を入力">
    </label>
    <button id="load" class="primary">表示を更新</button>
  </section>

  <section id="notice" class="notice">読み込み中…</section>

  <section class="cards" id="summaryCards">
    <article><span id="periodLabel">期間数</span><strong id="periods">-</strong></article>
    <article><span id="maxLabel">最大同接</span><strong id="maxListener">-</strong></article>
    <article><span id="streamLabel">再生数増加</span><strong id="streamGrowth">-</strong></article>
    <article><span id="memberLabel">メンバー増加</span><strong id="memberGrowth">-</strong></article>
  </section>

  <section class="panel" id="chartPanel">
    <div class="head">
      <div><p class="section-kicker">TREND</p><h2 id="chartTitle">推移グラフ</h2></div>
      <select id="metric">
        <option value="listener_max">最大同接</option>
        <option value="listener_avg">平均同接</option>
        <option value="stream_growth">再生数増加</option>
        <option value="member_growth">メンバー増加</option>
        <option value="stream_end">総再生数</option>
        <option value="member_end">メンバー</option>
      </select>
    </div>
    <canvas id="chart" width="1200" height="420" aria-label="時系列グラフ"></canvas>
    <div id="chartLegend" class="chart-legend" aria-label="グラフ凡例"></div>
    <div class="chart-axis-dates" aria-label="表示期間">
      <span id="chartStartDate">—</span>
      <span id="chartEndDate">—</span>
    </div>
    <div class="chart-detail" id="chartDetail" aria-live="polite">
      <span>グラフをタッチまたはクリックすると、その時点の詳細を表示します。</span>
    </div>
    <div class="chart-foot" id="chartFoot">値が大きいほどグラフの上に表示されます。</div>
  </section>

  <section class="panel">
    <div class="head">
      <div><p class="section-kicker">DATA</p><h2 id="tableTitle">データ一覧</h2></div>
      <button id="csv" class="secondary">CSV</button>
    </div>
    <div class="table"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
    <div class="more"><button id="more" hidden>次の200件</button></div>
  </section>

  <section class="panel" id="rankingWeeklyPanel" hidden>
    <div class="head">
      <div>
        <p class="section-kicker">BUDDIES WEEKLY METRICS</p>
        <h2>Buddies週間実績（参考）</h2>
      </div>
    </div>
    <p class="panel-note">以下は各ホスト個人の実績ではなく、Buddiesチャンネル全体の週次集計です。</p>
    <div class="table weekly-metrics-table">
      <table>
        <thead id="weeklyThead"></thead>
        <tbody id="weeklyTbody"></tbody>
      </table>
    </div>
  </section>
</main>
<script src="/history/history.js" defer></script>
<script src="/history/history-default-range.js" defer></script>
<script src="/history/history-broadcasts.js" defer></script>
</body>
</html>
