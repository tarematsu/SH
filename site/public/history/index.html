<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive">
  <title>Buddies データ履歴</title><link rel="stylesheet" href="/history/history.css"><link rel="stylesheet" href="/design-system.css">
  <style>
    .hero .back{align-self:center;white-space:nowrap}.ranking-scope-tabs,.track-controls{display:flex;gap:8px;align-items:end;flex-wrap:wrap}.ranking-scope-tabs button{border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:11px;padding:10px 18px;cursor:pointer;font-weight:800}.ranking-scope-tabs button.active{background:var(--accent);color:#241927;border-color:transparent}.track-controls .week-check{display:flex;align-items:center;gap:7px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);font-weight:800}.track-controls .week-check input{width:auto;min-width:0}.period-menu{position:relative}.period-menu summary{list-style:none;cursor:pointer;border:1px solid var(--line);background:var(--panel2);border-radius:11px;padding:10px 18px;font-weight:800;min-width:145px}.period-menu summary::-webkit-details-marker{display:none}.period-list{position:absolute;z-index:20;top:calc(100% + 6px);right:0;min-width:170px;max-height:320px;overflow:auto;padding:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 32px #0008}.period-list button{display:block;width:100%;border:0;background:transparent;color:var(--text);text-align:left;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700}.period-list button:hover,.period-list button.active{background:var(--panel2)}.chart-legend{display:flex;flex-wrap:wrap;gap:8px 14px}.chart-legend span{display:inline-flex;align-items:center;gap:6px}.chart-legend i{width:10px;height:10px;border-radius:50%}#notice{display:none!important}
    @media(max-width:760px){.hero{align-items:center}.ranking-scope-tabs,.track-controls{width:100%}.ranking-scope-tabs button{flex:1}.period-menu{width:100%}.period-menu summary{width:100%;box-sizing:border-box}.period-list{left:0;right:auto;width:100%;box-sizing:border-box}}
  </style>
</head>
<body><main class="wrap">
  <header class="hero"><div><p class="eyebrow">BUDDIES DATA ARCHIVE</p><h1>データ履歴</h1></div><a class="back" href="/">現在の状況へ</a></header>
  <nav class="mode-tabs" aria-label="表示種類"><button data-mode="daily">日次</button><button data-mode="weekly" class="active">週次</button><button data-mode="monthly">月次</button><button data-mode="tracks">再生曲</button><button data-mode="broadcasts">公式ステヘ</button><button data-mode="ranking">リーダーボード</button></nav>
  <section class="guide" id="guide"><strong>週次集計</strong><span>週ごとの最大同接、再生数増加、メンバー増加を表示します。</span></section>
  <section class="controls" id="historyControls">
    <div id="rangePresets" class="range-presets" aria-label="期間プリセット"><button data-days="30">30日</button><button data-days="90">3か月</button><button data-days="365">1年</button><button data-days="all" class="active">全期間</button></div>
    <label id="fromWrap">開始<input id="from" type="date" value="2024-05-01"></label><label id="toWrap">終了<input id="to" type="date"></label>
    <div id="trackControls" class="track-controls" hidden><label>日付<input id="trackDate" type="date"></label><label class="week-check"><input id="trackWeekMode" type="checkbox">週表示</label></div>
    <div id="rankingScopeTabs" class="ranking-scope-tabs" hidden aria-label="リーダーボード表示対象"><button type="button" data-scope="featured" class="active">櫻坂</button><button type="button" data-scope="all">全て</button></div>
    <details id="rankingWeekMenu" class="period-menu" hidden><summary id="rankingWeekCurrent">最新週</summary><div id="rankingWeekList" class="period-list"></div></details>
    <label id="rankingScopeWrap" hidden>表示対象<select id="rankingScope"><option value="featured">櫻坂</option><option value="all">全ホスト</option></select></label><label id="hostWrap" hidden>ホスト検索<input id="host" type="search"></label><button id="load" class="primary">表示を更新</button>
  </section>
  <section id="notice" class="notice" hidden aria-hidden="true">読み込み中…</section>
  <section class="cards" id="summaryCards"><article><span id="periodLabel">期間数</span><strong id="periods">-</strong></article><article><span id="maxLabel">最大同接</span><strong id="maxListener">-</strong></article><article><span id="streamLabel">再生数増加</span><strong id="streamGrowth">-</strong></article><article><span id="memberLabel">メンバー増加</span><strong id="memberGrowth">-</strong></article></section>
  <section class="panel" id="chartPanel"><div class="head"><div><p class="section-kicker">TREND</p><h2 id="chartTitle">推移グラフ</h2></div><select id="metric" hidden disabled></select></div><canvas id="chart" width="1200" height="420"></canvas><div id="chartLegend" class="chart-legend"></div><div class="chart-axis-dates"><span id="chartStartDate">—</span><span id="chartEndDate">—</span></div><div class="chart-detail" id="chartDetail"><span>グラフをタッチまたはクリックすると、その時点の詳細を表示します。</span></div><div class="chart-foot" id="chartFoot">各指標は個別スケールで推移を比較します。</div></section>
  <section class="panel"><div class="head"><div><p class="section-kicker">DATA</p><h2 id="tableTitle">データ一覧</h2></div><button id="csv" class="secondary">CSV</button></div><div class="table"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div><div class="more"><button id="more" hidden>次の200件</button></div></section>
  <section class="panel" id="rankingWeeklyPanel" hidden><div class="head"><div><p class="section-kicker">BUDDIES WEEKLY METRICS</p><h2>Buddies週間実績（参考）</h2></div></div><div class="table weekly-metrics-table"><table><thead id="weeklyThead"></thead><tbody id="weeklyTbody"></tbody></table></div></section>
</main>
<script src="/history/history.js" defer></script><script src="/history/history-utc.js" defer></script><script src="/history/history-multiseries.js" defer></script><script src="/history/history-tracks.js" defer></script><script src="/history/history-mode-selectors.js" defer></script><script src="/history/history-default-range.js" defer></script><script src="/history/history-broadcasts.js" defer></script><script src="/history/history-summary-selectors.js" defer></script>
</body></html>
