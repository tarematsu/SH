<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8fb">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Buddies 過去データ</title>
  <link rel="stylesheet" href="/history/history-lite.css">
</head>
<body>
  <a class="skip-link" href="#historyContent">本文へ移動</a>
  <main id="historyContent" class="shell">
    <header class="top-card history-header">
      <div><p class="kicker">BUDDIES DATA ARCHIVE</p><h1>過去データ</h1></div>
      <a class="button" href="/">現在へ</a>
    </header>

    <nav id="modeTabs" class="mode-tabs" aria-label="表示種類">
      <button type="button" data-mode="current" class="active" aria-current="page">現在</button>
      <button type="button" data-mode="daily">日次</button>
      <button type="button" data-mode="weekly">週次</button>
      <button type="button" data-mode="ranking">リーダーボード</button>
      <button type="button" data-mode="monthly">月次</button>
      <button type="button" data-mode="tracks">再生曲</button>
      <a href="/history/likes/">いいね</a>
      <button type="button" data-mode="broadcasts">公式ストリーム</button>
    </nav>

    <section id="guide" class="guide" aria-live="polite">
      <div><p class="kicker">CURRENT</p><h2 id="guideTitle">現在のデータ</h2></div>
      <p id="guideText" hidden></p>
    </section>

    <section id="controls" class="controls card" hidden>
      <div id="standardControls" class="control-group standard-controls">
        <div id="rangePresets" class="range-presets" aria-label="期間プリセット">
          <button type="button" data-days="30">30日</button>
          <button type="button" data-days="90">3か月</button>
          <button type="button" data-days="365">1年</button>
          <button type="button" data-days="all" class="active">全期間</button>
        </div>
        <div class="date-range">
          <label><span>開始</span><input id="from" type="date" value="2024-05-01"></label>
          <span class="date-separator" aria-hidden="true">–</span>
          <label><span>終了</span><input id="to" type="date"></label>
        </div>
      </div>

      <div id="trackControls" class="control-group track-controls" hidden>
        <label><span>日付</span><input id="trackDate" type="date"></label>
        <label class="check-label"><input id="trackWeekMode" type="checkbox">週表示</label>
      </div>

      <div id="rankingControls" class="control-group ranking-controls" hidden>
        <label><span>対象</span><select id="rankingScope"><option value="featured">櫻坂</option><option value="all">全ホスト</option></select></label>
        <label><span>検索</span><input id="rankingHost" type="search" maxlength="100" placeholder="ホスト名"></label>
      </div>

      <button id="load" class="button primary compact-load" type="button">更新</button>
    </section>

    <p id="notice" class="notice" role="status">読み込み中…</p>

    <section id="summaryCards" class="summary-cards" aria-label="集計概要">
      <article><span id="periodLabel">表示件数</span><strong id="periods">-</strong></article>
      <article><span id="maxLabel">最新リスナー</span><strong id="maxListener">-</strong></article>
      <article><span id="streamLabel">最新総再生数</span><strong id="streamGrowth">-</strong></article>
      <article><span id="memberLabel">最新メンバー</span><strong id="memberGrowth">-</strong></article>
    </section>

    <section id="chartPanel" class="card chart-panel">
      <div class="section-head chart-head">
        <div><p class="kicker">TREND</p><h2 id="chartTitle">オンライン・コメント勢い（24時間）</h2></div>
        <div id="audienceLegend" class="chart-legend audience-legend"><span><i class="online-dot"></i>オンライン</span><span><i class="comment-dot"></i>コメント勢い</span></div>
        <div id="chartLegend" class="chart-legend" aria-label="グラフ凡例" hidden></div>
      </div>
      <canvas id="audienceChart" width="960" height="360" aria-label="直近24時間のオンライン人数とコメント勢い"></canvas>
      <canvas id="chart" width="960" height="360" aria-label="履歴推移グラフ" hidden></canvas>
      <div id="audienceAxis" class="chart-axis"><span>-</span><span>-</span></div>
      <div id="legacyChartAxis" class="chart-axis" hidden><span id="chartStartDate">-</span><span id="chartEndDate">-</span></div>
      <div id="audienceDetail" class="chart-detail" hidden></div>
      <div id="chartDetail" class="chart-detail" hidden></div>
      <p id="chartFoot" class="chart-foot" hidden></p>
    </section>

    <section class="card data-panel">
      <div class="section-head">
        <div><p class="kicker">DATA</p><h2 id="tableTitle">直近1440件</h2></div>
        <button id="csv" class="button" type="button">CSV</button>
      </div>
      <div class="table-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
      <button id="more" class="button more-button" type="button" hidden>さらに表示</button>
    </section>

    <section id="rankingWeeklyPanel" class="card data-panel" hidden>
      <div class="section-head"><div><p class="kicker">BUDDIES WEEKLY METRICS</p><h2>Buddies週間実績</h2></div></div>
      <div class="table-wrap"><table><thead id="rankingWeeklyThead"></thead><tbody id="rankingWeeklyTbody"></tbody></table></div>
    </section>
  </main>
  <!-- history-main.js imports the consolidated runtime: src="/history/history-lite.js" -->
  <script type="module" src="/history/history-main.js"></script>
</body>
</html>
