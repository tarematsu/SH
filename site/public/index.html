<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8fb">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Buddies Station Monitor</title>
  <link rel="stylesheet" href="/app-lite.css">
</head>
<body>
  <a class="skip-link" href="#content">本文へ移動</a>
  <main id="content" class="shell">
    <header class="top-card">
      <div class="channel">
        <span class="channel-visual" aria-hidden="true">
          <span id="channelFallback" class="channel-fallback">B</span>
          <img id="channelImage" class="channel-image" alt="" width="72" height="72" decoding="async" hidden>
        </span>
        <div class="channel-copy">
          <p class="kicker">STATIONHEAD LIVE MONITOR</p>
          <h1 id="channelName">Buddies</h1>
          <p id="description" class="subtle">読み込み中...</p>
          <p class="live-line"><span id="liveDot" class="live-dot" aria-hidden="true"></span><span id="liveState">状態を確認中</span><span aria-hidden="true">·</span><span id="updated">-</span></p>
        </div>
      </div>
      <nav class="top-actions" aria-label="関連リンク">
        <a class="button primary" href="stationhead://station/3328626">アプリで開く</a>
        <a class="button" href="/history/">過去データ</a>
      </nav>
    </header>

    <section class="metrics" aria-label="現在の指標">
      <article class="metric featured"><span>オンライン</span><div class="metric-value"><strong id="online">-</strong><small>人</small></div></article>
      <article class="metric"><span>ユニーク参加者</span><div class="metric-value"><strong id="members">-</strong></div><div id="membersDelta" class="delta" hidden></div></article>
      <article class="metric"><span>延べ参加者</span><div class="metric-value"><strong id="totalListens">-</strong></div><div id="listensDelta" class="delta" hidden></div></article>
    </section>

    <section class="primary-grid">
      <article class="card now-card">
        <div class="section-head now-head">
          <div><p class="kicker">NOW PLAYING</p><h2>再生中の曲</h2></div>
          <div id="host" class="host"></div>
        </div>
        <a id="nowPlayingLink" class="now-playing" target="_blank" rel="noopener noreferrer" aria-disabled="true">
          <span class="track-visual" aria-hidden="true">
            <span id="trackFallback" class="track-fallback">♪</span>
            <img id="trackImage" class="track-image" alt="" width="104" height="104" decoding="async" hidden>
          </span>
          <div class="track-copy">
            <strong id="trackTitle">曲情報を取得中...</strong>
            <span id="trackArtist" class="subtle"></span>
            <div class="time-row"><span id="trackTime">-</span><span id="spotifyHint" hidden>Spotifyで開く</span></div>
            <div class="progress" aria-hidden="true"><i id="trackBar"></i></div>
          </div>
        </a>
      </article>

      <article class="card queue-card">
        <div class="section-head queue-head">
          <div><p class="kicker">UP NEXT</p><h2>今後の再生予定</h2></div>
          <span id="queueCount" class="pill">-</span>
        </div>
        <div id="queue" class="queue" aria-live="polite"></div>
        <button id="queueMore" class="button queue-more" type="button" hidden>続きを読み込む</button>
      </article>
    </section>

    <section class="card goal-card">
      <div class="section-head"><div><p class="kicker">STREAMING GOAL</p><h2>累計再生数の目標</h2></div></div>
      <div class="goal-layout">
        <div class="goal-progress">
          <div class="goal-number"><strong id="streamCount">-</strong><span>/ <b id="streamGoal">-</b></span></div>
          <div class="progress large" aria-hidden="true"><i id="goalBar"></i></div>
          <div class="goal-foot"><strong id="goalPercent">-</strong><span id="goalRemaining">-</span></div>
        </div>
        <div class="prediction">
          <span>予測到達時期</span>
          <strong id="goalEta">計算中</strong>
          <small id="goalRate">-</small>
          <div id="goalMilestones" class="milestones"></div>
        </div>
      </div>
    </section>

    <section class="card chart-card">
      <div class="section-head chart-head">
        <div><p class="kicker">LAST 24 HOURS</p><h2>オンライン・コメント勢い</h2></div>
        <div class="legend" aria-label="グラフ凡例"><span class="online-key">オンライン</span><span class="comment-key">コメント勢い</span></div>
      </div>
      <canvas id="audienceChart" width="960" height="360" aria-label="過去24時間のオンライン人数とコメント勢い"></canvas>
      <div id="chartDetail" class="chart-detail">グラフをタッチすると、その時点の数値を表示します。</div>
    </section>

    <p id="statusMessage" class="status-message" role="status" hidden></p>
  </main>
  <script type="module" src="/app-main.js"></script>
</body>
</html>
