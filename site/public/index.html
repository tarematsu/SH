<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buddies Station Monitor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Buddies Station Monitor</h1>
      <p id="health">読み込み中...</p>
    </header>

    <section class="cards">
      <article><span>状態</span><strong id="status">-</strong></article>
      <article><span>再生数</span><strong id="plays">-</strong></article>
      <article><span>コメント数</span><strong id="commentCount">-</strong></article>
      <article><span>最終取得</span><strong id="updated">-</strong></article>
    </section>

    <section class="panel">
      <h2>直近24時間</h2>
      <canvas id="chart" width="1000" height="320"></canvas>
    </section>

    <section class="panel">
      <h2>最新コメント</h2>
      <table>
        <thead><tr><th>時刻</th><th>投稿者</th><th>コメント</th></tr></thead>
        <tbody id="comments"></tbody>
      </table>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
