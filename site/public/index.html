<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111019">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <title>Buddies Station Monitor</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/dashboard-interactive.css">
  <link rel="stylesheet" href="/design-system.css">
  <link rel="stylesheet" href="/comment-velocity-chart.css">
</head>
<body>
  <div class="backdrop"></div>
  <main class="container">
    <header class="hero panel">
      <div class="identity">
        <img id="channelImage" class="channel-image" alt="Buddies">
        <div>
          <p class="eyebrow">STATIONHEAD LIVE MONITOR</p>
          <h1 id="channelName">Buddies</h1>
          <p id="description" class="muted">読み込み中...</p>
        </div>
      </div>
      <div class="hero-side">
        <div class="actions">
          <a class="action use-app" href="stationhead://station/3328626" aria-label="StationheadアプリでBuddiesを開く">
            <span class="use-app-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" focusable="false">
                <path d="M8 2.75h8A2.25 2.25 0 0 1 18.25 5v14A2.25 2.25 0 0 1 16 21.25H8A2.25 2.25 0 0 1 5.75 19V5A2.25 2.25 0 0 1 8 2.75Zm0 1.5A.75.75 0 0 0 7.25 5v14c0 .414.336.75.75.75h8a.75.75 0 0 0 .75-.75V5a.75.75 0 0 0-.75-.75H8Zm2.25 13.5h3.5v1.5h-3.5v-1.5Zm1.75-11 3.25 3.25-1.06 1.06-1.44-1.44v4.63h-1.5V9.62l-1.44 1.44L8.75 10 12 6.75Z" fill="currentColor"/>
              </svg>
            </span>
            <span>アプリで開く</span>
          </a>
          <a class="action" href="https://www.stationhead.com/c/buddies" target="_blank" rel="noopener">ウェブページを開く</a>
        </div>
        <span id="updated" class="muted small">-</span>
      </div>
      <a class="action primary history-link" href="/history/index.html">過去データ</a>
    </header>

    <section class="metrics" aria-label="現在の指標">
      <article class="metric metric-main"><span>オンライン</span><strong id="online">-</strong></article>
      <article class="metric"><span>ユニーク参加者</span><strong id="members">-</strong><div id="membersDelta" class="daily-delta" hidden></div></article>
      <article class="metric"><span>延べ参加者</span><strong id="totalListens">-</strong><div id="listensDelta" class="daily-delta" hidden></div></article>
    </section>

    <section class="main-grid">
      <article class="panel now-playing">
        <div class="section-head"><div><p class="eyebrow">NOW PLAYING</p><h2>再生中</h2></div></div>
        <div id="nowPlaying" class="now-content empty">曲情報を取得中...</div>
      </article>
      <article class="panel queue-panel">
        <div class="section-head"><div><p class="eyebrow">UP NEXT</p><h2>今後の再生予定</h2></div><span id="queueCount" class="chip">-</span></div>
        <div class="queue-slider-wrap"><div id="queue" class="queue-list" tabindex="0" aria-label="今後の再生予定。スクロールして全曲を確認できます"></div></div>
        <p class="queue-hint">スクロールして全曲を確認</p>
      </article>
    </section>

    <section class="panel goal-panel">
      <div class="section-head"><div><p class="eyebrow">STREAMING GOAL</p><h2>ストリーム目標</h2></div></div>
      <div class="goal-layout">
        <div>
          <div class="goal-numbers"><strong id="streamCount">-</strong><span>/ <b id="streamGoal">-</b></span></div>
          <div class="progress"><i id="goalBar"></i></div>
          <div class="goal-foot"><span id="goalPercent">-</span><span id="goalRemaining">-</span></div>
        </div>
        <div class="prediction-card"><small>予測到達時期</small><strong id="goalEta">計算中</strong><span id="goalRate">-</span></div>
      </div>
    </section>

    <section class="panel chart-panel">
      <div class="section-head"><div><p class="eyebrow">LAST 24 HOURS</p><h2>オンライン・コメント勢い推移</h2></div><div class="legend"><span class="legend-online">● オンライン</span><span class="legend-comments">▮ コメント勢い</span></div></div>
      <canvas id="chart" width="1200" height="360" aria-label="オンライン数とコメント勢いの推移"></canvas>
      <div id="mainChartDetail" class="main-chart-detail" aria-live="polite">グラフをタッチまたはクリックすると、その時点の日時と数値を表示します。</div>
    </section>
  </main>
  <script src="/dashboard-fetch-cache.js" defer></script>
  <script src="/app-state.js" defer></script>
  <script src="/app-chart.js" defer></script>
  <script src="/app-playback.js" defer></script>
  <script src="/app.js" defer></script>
  <script src="/sh-ui-fixes.js" defer></script>
  <script src="/dashboard-dom-utils.js" defer></script>
  <script src="/dashboard-history-cache.js" defer></script>
  <script src="/dashboard-optimized.js" defer></script>
  <script src="/dashboard-display-guards.js" defer></script>
  <script src="/dashboard-recovery.js" defer></script>
  <script src="/eta-daypart.js" defer></script>
</body>
</html>
